<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>З 8 Березня, Найкраща Мамо!</title>
    <style>
        :root {
            --pink: #ff4d6d;
            --gold: #fccb00;
            --dark-red: #800e13;
            --glass: rgba(255, 255, 255, 0.7);
        }

        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(45deg, #fff0f3, #ffccd5);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        /* Анімований фон */
        #bg-particles {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Стиль побажань-хмаринок */
        .bubble-wish {
            position: absolute;
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 25px;
            color: var(--dark-red);
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 8px 32px rgba(255, 77, 109, 0.15);
            animation: floatIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            z-index: 5;
        }

        @keyframes floatIn {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* Головне серце */
        #heart-container {
            position: relative;
            z-index: 50;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.5);
            -webkit-tap-highlight-color: transparent;
        }

        .heart {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--pink), #ff758f);
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 15px 45px rgba(255, 77, 109, 0.4);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .heart::before, .heart::after {
            content: "";
            width: 90px;
            height: 90px;
            background: inherit;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -45px; left: 0; }
        .heart::after { left: 45px; top: 0; }

        /* Фінальний екран */
        #final-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #ffffff, #fff0f3);
            z-index: 100;
            padding: 25px;
            box-sizing: border-box;
        }

        .final-line {
            opacity: 0;
            transform: scale(0.9);
            color: var(--dark-red);
            font-size: 1.6rem;
            margin: 12px 0;
            font-weight: 800;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .final-line.show {
            opacity: 1;
            transform: scale(1);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 101;
        }
    </style>
</head>
<body>

    <div id="bg-particles"></div>
    <div id="wishes-cloud"></div>

    <div id="heart-container" onclick="handleInteraction()">
        <div class="heart"></div>
    </div>

    <div id="final-screen">
        <div class="final-line">✨ Дорога матусю! ✨</div>
        <div class="final-line">Вітаю тебе зі святом весни! 🌷</div>
        <div class="final-line" style="font-size: 1.2rem; font-weight: 500;">Нехай кожен твій день буде сповнений тепла, усмішок та натхнення.</div>
        <div class="final-line" style="font-size: 1.2rem; font-weight: 500;">Бажаю міцного здоров’я, безмежного щастя та гармонії в душі.</div>
        <div class="final-line">Дякую за твою любов і доброту! ❤️</div>
    </div>

    <script>
        let clicks = 0;
        const maxClicks = 10;
        const miniWishes = ["Ніжність 🌸", "Тепло ☀️", "Радість 😊", "Квіти 💐", "Усмішки ✨", "Здоров'я 💪", "Любов ❤️", "Затишок 🏠", "Щастя 🌈", "Мрії 🎈"];

        // Створення літаючих частинок на фоні
        function createBg() {
            const bg = document.getElementById('bg-particles');
            for(let i=0; i<15; i++) {
                const dot = document.createElement('div');
                dot.style.cssText = `
                    position: absolute;
                    width: ${Math.random()*20 + 10}px;
                    height: ${Math.random()*20 + 10}px;
                    background: white;
                    opacity: 0.3;
                    border-radius: 50%;
                    top: ${Math.random()*100}%;
                    left: ${Math.random()*100}%;
                    filter: blur(2px);
                    animation: floatBg ${Math.random()*5 + 5}s infinite ease-in-out;
                `;
                bg.appendChild(dot);
            }
        }
        createBg();

        function handleInteraction() {
            if (clicks >= maxClicks) return;
            clicks++;
            createBubble();

            const heart = document.getElementById('heart-container');
            const scale = 1 + (clicks * 0.15);
            heart.style.transform = `scale(${scale})`;

            // Додаємо вібрацію на телефон при кліку
            if (window.navigator.vibrate) window.navigator.vibrate(50);

            if (clicks === maxClicks) {
                explode();
            }
        }

        function createBubble() {
            const container = document.getElementById('wishes-cloud');
            const bubble = document.createElement('div');
            bubble.className = 'bubble-wish';
            
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.38;
            
            const x = (window.innerWidth / 2) + Math.cos(angle) * radius - 50;
            const y = (window.innerHeight / 2) + Math.sin(angle) * radius - 20;

            bubble.style.left = Math.max(20, Math.min(x, window.innerWidth - 120)) + 'px';
            bubble.style.top = Math.max(20, Math.min(y, window.innerHeight - 60)) + 'px';
            bubble.innerText = miniWishes[clicks - 1];
            container.appendChild(bubble);
        }

        function explode() {
            const heart = document.getElementById('heart-container');
            const colors = ['#ff4d6d', '#fccb00', '#ffccd5', '#ffffff'];

            for (let i = 0; i < 60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.background = colors[Math.floor(Math.random()*colors.length)];
                c.style.left = '50%'; c.style.top = '50%';
                document.body.appendChild(c);

                const tx = (Math.random() - 0.5) * window.innerWidth * 1.5;
                const ty = (Math.random() - 0.5) * window.innerHeight * 1.5;

                c.animate([
                    { transform: 'translate(-50%, -50%) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) rotate(${Math.random()*360}deg)`, opacity: 0 }
                ], { duration: 1500, easing: 'ease-out' }).onfinish = () => c.remove();
            }

            heart.style.display = 'none';
            document.getElementById('wishes-cloud').style.opacity = '0';

            setTimeout(() => {
                const screen = document.getElementById('final-screen');
                screen.style.display = 'flex';
                
                const lines = document.querySelectorAll('.final-line');
                lines.forEach((line, index) => {
                    setTimeout(() => line.classList.add('show'), index * 1200);
                });
            }, 300);
        }
    </script>

    <style>
        @keyframes floatBg {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }
    </style>
</body>
</html>
