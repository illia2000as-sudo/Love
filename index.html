<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>З 8 Березня, Мамо!</title>
    <style>
        :root {
            --pink: #ff4d6d;
            --dark-red: #c9184a;
            --soft-bg: #fff0f3;
        }

        body {
            margin: 0;
            overflow: hidden;
            background: var(--soft-bg);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation; /* Оптимізація для швидких кліків на мобільних */
        }

        /* Контейнер для накопичених побажань */
        #wishes-cloud {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .bubble-wish {
            position: absolute;
            background: white;
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--dark-red);
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            white-space: nowrap;
            animation: pop 0.4s ease-out forwards;
            z-index: 5;
        }

        /* Адаптація розміру тексту побажань для малих екранів */
        @media (max-width: 480px) {
            .bubble-wish { font-size: 0.7rem; padding: 4px 10px; }
        }

        @keyframes pop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        /* Центральне серце */
        #heart-container {
            position: relative;
            z-index: 50;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent; /* Прибираємо синій контур при кліку на iOS */
        }

        .heart {
            width: 80px;
            height: 80px;
            background-color: var(--pink);
            position: relative;
            transform: rotate(-45deg);
        }

        .heart::before, .heart::after {
            content: "";
            width: 80px;
            height: 80px;
            background-color: var(--pink);
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -40px; left: 0; }
        .heart::after { left: 40px; top: 0; }

        /* Фінальний екран */
        #final-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .final-line {
            opacity: 0;
            transform: translateY(15px);
            color: var(--dark-red);
            font-size: 1.4rem; /* Оптимально для мобільних */
            margin: 8px 0;
            font-weight: bold;
            line-height: 1.3;
            transition: all 0.6s ease-out;
        }

        @media (min-width: 768px) {
            .final-line { font-size: 2rem; }
            .heart { width: 100px; height: 100px; }
            .heart::before, .heart::after { width: 100px; height: 100px; }
            .heart::before { top: -50px; }
            .heart::after { left: 50px; }
        }

        .final-line.show {
            opacity: 1;
            transform: translateY(0);
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: var(--pink);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="wishes-cloud"></div>

    <div id="heart-container" onclick="handleInteraction()">
        <div class="heart"></div>
    </div>

    <div id="final-screen">
        <div class="final-line">Дорога матусю!</div>
        <div class="final-line">Вітаю тебе зі святом весни!</div>
        <div class="final-line" style="font-size: 1.1rem; font-weight: normal;">Нехай кожен твій день буде сповнений тепла, усмішок та натхнення.</div>
        <div class="final-line" style="font-size: 1.1rem; font-weight: normal;">Бажаю міцного здоров’я, безмежного щастя та гармонії в душі.</div>
        <div class="final-line">Дякую за твою любов і доброту! ❤️</div>
    </div>

    <script>
        let clicks = 0;
        const maxClicks = 10;
        const miniWishes = ["Ніжність 🌸", "Тепло ☀️", "Радість 😊", "Квіти 💐", "Усмішки ✨", "Здоров'я 💪", "Любов ❤️", "Затишок 🏠", "Щастя 🌈", "Мрії 🎈"];

        function handleInteraction() {
            if (clicks >= maxClicks) return;

            clicks++;
            createBubble();

            const heartContainer = document.getElementById('heart-container');
            // Обмеження масштабу для мобільних, щоб серце не вилазило за екран
            const scaleFactor = window.innerWidth < 480 ? 0.1 : 0.15;
            heartContainer.style.transform = `scale(${1 + clicks * scaleFactor})`;

            if (clicks === maxClicks) {
                explode();
            }
        }

        function createBubble() {
            const container = document.getElementById('wishes-cloud');
            const bubble = document.createElement('div');
            bubble.className = 'bubble-wish';
            
            const angle = Math.random() * Math.PI * 2;
            // Радіус розльоту залежить від ширини екрану
            const radius = Math.min(window.innerWidth, window.innerHeight) * 0.35;
            const distance = radius + Math.random() * 50; 
            
            const x = (window.innerWidth / 2) + Math.cos(angle) * distance - 40;
            const y = (window.innerHeight / 2) + Math.sin(angle) * distance;

            bubble.style.left = Math.max(10, Math.min(x, window.innerWidth - 80)) + 'px';
            bubble.style.top = Math.max(10, Math.min(y, window.innerHeight - 40)) + 'px';
            bubble.innerText = miniWishes[clicks - 1] || "Вітаю!";
            
            container.appendChild(bubble);
        }

        function explode() {
            const heart = document.getElementById('heart-container');
            
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = '50%';
                p.style.top = '50%';
                document.body.appendChild(p);

                const tx = (Math.random() - 0.5) * window.innerWidth;
                const ty = (Math.random() - 0.5) * window.innerHeight;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 800, easing: 'ease-out' }).onfinish = () => p.remove();
            }

            heart.style.display = 'none';
            document.getElementById('wishes-cloud').style.opacity = '0';

            const screen = document.getElementById('final-screen');
            screen.style.display = 'flex';
            
            const lines = document.querySelectorAll('.final-line');
            lines.forEach((line, index) => {
                setTimeout(() => {
                    line.classList.add('show');
                }, index * 1200); 
            });
        }
    </script>
</body>
</html>
