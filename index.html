          print(`ДЗ на учня:        ${students.length > 0 ? (state.submissions.length/students.length).toFixed(1) : '—'}`, '#e8e9f0');
          print(`Оцінено відп.:     ${graded.length}/${state.submissions.length}`, '#e8e9f0');
          const active = students.filter(u => state.submissions.some(s=>s.studentUid===u.uid));
          print(`Активних учнів:    ${active.length}/${students.length}`, active.length>0?'#3ecf8e':'#8a8da0');

        } else if (args[0] === 'setapikey' || args[0] === 'setApiKey') {
          if (!args[1]) {
            print('Використання: setApiKey sk-ant-...', '#8a8da0');
            print('Отримати ключ: console.anthropic.com', '#8a8da0');
          } else {
            localStorage.setItem('lz_ai_key', args[1]);
            print('✓ API ключ збережено! AI-помічник тепер працює.', '#3ecf8e');
          }

        } else if (args[0] === 'removeapikey') {
          localStorage.removeItem('lz_ai_key');
          print('✓ API ключ видалено.', '#3ecf8e');

        } else if (args[0] === 'give') {
          if (args.length < 3) {
            print('Використання: give <логін або ім\'я> <кількість>', '#8a8da0');
            print('Приклади: give 2013 100  /  give "Ілля Ігнатенко" 500', '#8a8da0');
          } else {
            // Last arg = amount, everything between = name/login
            const amountStr = args[args.length - 1];
            const nameQuery = args.slice(1, args.length - 1).join(' ').toLowerCase().replace(/^"|"$/g,'');
            const amount = parseInt(amountStr);
            if (isNaN(amount) || amount === 0) { print('✗ Останній аргумент має бути числом', '#ef4444'); }
            else {
              const allWithSelf = [...state.allUsers];
              if (!allWithSelf.find(x => x.uid === state.user.uid)) allWithSelf.push(state.user);
              // Search by username OR displayName (case-insensitive)
              const targetUser = allWithSelf.find(x =>
                (x.username||'').toLowerCase() === nameQuery ||
                (x.displayName||'').toLowerCase() === nameQuery
              );
              if (!targetUser) {
                print(`✗ Юзер "${escapeHtml(nameQuery)}" не знайдений`, '#ef4444');
                print(`  Введи: users — щоб побачити всі логіни та імена`, '#8a8da0');
              } else {
                await giveCoins(targetUser.uid, amount);
                if (targetUser.uid === state.user.uid) {
                  state.user.coins = (state.user.coins || 0) + amount;
                  state.coins = state.user.coins;
                  saveSession(state.user);
                  document.querySelectorAll('.coin-display').forEach(el => el.textContent = state.coins);
                }
                print(`${amount>0?'✓ Нараховано':'✓ Знято'} ${Math.abs(amount)} 🪙 → ${escapeHtml(targetUser.displayName)} (@${escapeHtml(targetUser.username)})`, '#3ecf8e');
                const snap = await db.ref('users/' + targetUser.uid + '/coins').once('value');
                print(`  Новий баланс: ${snap.val()||0} 🪙`, '#d4a537');
              }
            }
          }

        } else {
          print(`✗ Невідома команда: "${escapeHtml(raw)}"`, '#ef4444');
          print(`  Введіть <span style="color:#3ecf8e">help</span> для списку команд`, '#8a8da0');
        }
      }

      // Run button
      document.getElementById('consoleRunBtn').onclick = () => {
        const val = input.value;
        if (!val.trim()) return;
        history.unshift(val); histIdx = -1;
        input.value = '';
        runCommand(val);
      };

      // Enter key
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const val = input.value;
          if (!val.trim()) return;
          history.unshift(val); histIdx = -1;
          input.value = '';
          runCommand(val);
        }
        // History navigation with arrows
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
        }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
          else { histIdx = -1; input.value = ''; }
        }
        // Tab autocomplete
        if (e.key === 'Tab') {
          e.preventDefault();
          const cmds = ['help','status','users','user ','homeworks','hw ','submissions','quizzes','schools','ping','stats','give ','whoami','clear','version'];
          const match = cmds.find(c => c.startsWith(input.value) && c !== input.value);
          if (match) input.value = match;
        }
      });

      // Quick commands
      document.querySelectorAll('.quick-cmd').forEach(btn => {
        btn.onclick = () => {
          input.value = btn.dataset.cmd;
          history.unshift(btn.dataset.cmd); histIdx = -1;
          input.value = '';
          runCommand(btn.dataset.cmd);
        };
      });

      input.focus();
    }

    function renderChat(el) {
      const u = state.user;
      window._chatRefresh = null; // clear while building

      el.innerHTML = `<div class="flex flex-col gap-4 animate-fadeIn" style="max-width:720px">
        <div class="flex items-center gap-3">
          <span class="text-primary icon-xl">${icons.chat}</span>
          <h1 class="text-xl font-bold font-mono">Чат класу</h1>
          <span class="badge badge-muted" id="chatCount">${(state.chatMessages||[]).length} повідомлень</span>
        </div>
        <div class="card" style="display:flex;flex-direction:column;height:500px">
          <div id="chatMsgs" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px"></div>
          <div style="border-top:1px solid var(--border);padding:12px;display:flex;gap:8px;align-items:center">

      function buildMsg(m) {
        const isMe = m.authorUid === u.uid;
        const canDel = isMe || u.role === 'creator' || u.role === 'homeroom';
        const wrap = document.createElement('div');
        wrap.style.cssText = `display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'};gap:3px`;
        wrap.dataset.msgid = m.id;
        wrap.innerHTML = `
          <div style="display:flex;align-items:center;gap:5px;${isMe?'flex-direction:row-reverse':''}">
            <div class="avatar avatar-${isMe?'primary':'secondary'}" style="width:22px;height:22px;font-size:9px">${escapeHtml(m.authorName.charAt(0))}</div>
            <span style="font-size:11px;color:var(--fg-muted)">${escapeHtml(m.authorName)}</span>
            <span class="badge badge-${m.authorRole==='student'?'accent':m.authorRole==='creator'?'warning':'primary'}" style="font-size:9px;padding:1px 5px">${roleLabels[m.authorRole]||m.authorRole}</span>
            <span style="font-size:11px;color:var(--fg-muted)">${formatDateTime(m.createdAt)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:4px;${isMe?'flex-direction:row-reverse':''}">
            <div style="max-width:360px;padding:9px 13px;border-radius:${isMe?'14px 4px 14px 14px':'4px 14px 14px 14px'};background:${isMe?'var(--primary)':'var(--bg-secondary)'};color:${isMe?'white':'var(--fg)'};font-size:14px;line-height:1.5;word-break:break-word">${escapeHtml(m.text)}</div>
            ${canDel?`<button class="btn btn-ghost btn-icon sm delbtn" data-delchat="${m.id}" style="opacity:0;transition:opacity .15s">${icons.trash}</button>`:''}
          </div>`;
        wrap.onmouseenter = () => wrap.querySelectorAll('.delbtn').forEach(b=>b.style.opacity='0.6');
        wrap.onmouseleave = () => wrap.querySelectorAll('.delbtn').forEach(b=>b.style.opacity='0');
        wrap.querySelectorAll('[data-delchat]').forEach(btn => {
          btn.onclick = () => deleteChatMsg(btn.dataset.delchat);
        });
        return wrap;
      }

      function refreshMsgs() {
        const msgs = state.chatMessages || [];
        const container = document.getElementById('chatMsgs');
        const countEl = document.getElementById('chatCount');
        if (!container) { window._chatRefresh = null; return; }
        const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
        const existing = new Set([...container.querySelectorAll('[data-msgid]')].map(el=>el.dataset.msgid));
        const current = new Set(msgs.map(m=>m.id));
        // Remove deleted messages
        container.querySelectorAll('[data-msgid]').forEach(el => { if(!current.has(el.dataset.msgid)) el.remove(); });
        // Add new messages
        msgs.forEach(m => {
          if (!existing.has(m.id)) {
            const after = [...container.querySelectorAll('[data-msgid]')].find(el => {
              const msg = msgs.find(x=>x.id===el.dataset.msgid);
              return msg && msg.createdAt > m.createdAt;
            });
            const node = buildMsg(m);
            if (after) container.insertBefore(node, after);
            else container.appendChild(node);
          }
        });
        if (msgs.length === 0) {
          container.innerHTML = `<div class="flex flex-col items-center justify-center gap-2" style="flex:1;height:100%;color:var(--fg-muted)"><span style="font-size:40px">💬</span><p class="text-sm">Повідомлень поки немає. Напишіть перше!</p></div>`;
        }
        if (countEl) countEl.textContent = msgs.length + ' повідомлень';
        if (wasAtBottom) container.scrollTop = container.scrollHeight;
      }

      refreshMsgs();
      document.getElementById('chatMsgs').scrollTop = document.getElementById('chatMsgs').scrollHeight;

      // Register global refresh so Firebase listener can call it without full re-render
      window._chatRefresh = refreshMsgs;

      const chatInput = document.getElementById('chatInput');
      const sendFn = async () => {
        const text = chatInput.value.trim();
        if (!text) return;
        chatInput.value = '';
        chatInput.focus();
        await sendChatMsg(text);
      };
      document.getElementById('chatSend').onclick = sendFn;
      chatInput.addEventListener('keydown', e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendFn(); } });
      chatInput.focus();
    }

                  <div class="flex-1 min-w-0"><p class="text-sm truncate">${escapeHtml(e.title)}</p><p class="text-xs text-muted">${e.date}</p></div>
                  ${canEdit?`<button class="btn btn-ghost btn-icon sm" data-delev="${e.id}">${icons.trash}</button>`:''}
                </div>`).join('')}

              <h3 class="text-sm font-semibold mb-3">📚 Дедлайни ДЗ</h3>
              ${hwDue.map(hw => `<div class="flex items-center gap-3 py-2 border-b">
                <span class="text-primary">${icons.file}</span>
                <div class="flex-1 min-w-0"><p class="text-sm truncate">${escapeHtml(hw.title)}</p><p class="text-xs text-muted">${hw.dueDate}</p></div>
              </div>`).join('')}

      document.getElementById('prevMonth').onclick = () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(el); };
      document.getElementById('nextMonth').onclick = () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(el); };
      el.querySelectorAll('.cal-day[data-date]').forEach(d => {
        d.onclick = () => {

            <div class="flex flex-col gap-3">
              <div><label class="label">Назва</label><input class="input" id="evTitle" placeholder="Назва події"></div>

              <div><label class="label">Опис</label><input class="input" id="evDesc" placeholder="Необов'язково"></div>
              <div><label class="label">Колір</label><div class="flex gap-2 mt-1">${colors.map((c,i)=>`<div data-c="${c}" style="width:26px;height:26px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${i===0?'white':'transparent'}" onclick="this.parentElement.querySelectorAll('[data-c]').forEach(x=>x.style.borderColor='transparent');this.style.borderColor='white';window._evColor='${c}'"></div>`).join('')}</div></div>
              <div class="flex gap-2 justify-end">
                <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Скасувати</button>
                <button class="btn btn-primary" id="saveEvBtn">Зберегти</button>
              </div>
            </div>`);

            const date = document.getElementById('evDate').value;

            m.remove();
          };
        };

    // ===== PLANNER (Calendar + Schedule merged) =====
    function renderPlanner(el) {
      const tabs = [
        { id: 'calendar', label: `${icons.calBig} Календар` },
        { id: 'schedule', label: `${icons.clock2} Розклад` },
      ];
      const activeTab = state.plannerTab || 'calendar';

      el.innerHTML = `<div class="flex flex-col gap-4 animate-fadeIn">
        <div class="flex items-center gap-3 mb-1">
          <span class="text-primary icon-xl">${icons.calBig}</span>
          <h1 class="text-xl font-bold">Планер</h1>
        </div>
        <div class="flex gap-1 p-1" style="background:var(--bg-secondary);border-radius:12px;width:fit-content">
          ${tabs.map(t => `<button class="btn btn-sm ${t.id===activeTab?'btn-primary':''}" style="${t.id===activeTab?'':'background:transparent;color:var(--fg-muted)'}" data-plantab="${t.id}">${t.label}</button>`).join('')}
        </div>
        <div id="plannerContent"></div>
      </div>`;

      el.querySelectorAll('[data-plantab]').forEach(btn => {
        btn.onclick = () => {
          state.plannerTab = btn.dataset.plantab;
          renderPlanner(el);

      else renderSchedule(content);

    // ===== SCHEDULE =====
    function renderSchedule(el) {
      const u = state.user;
      const canEdit = u.role !== 'student';
      const days = ['Понеділок','Вівторок','Середа','Четвер','П\'ятниця','Субота'];
      const dayKeys = ['mon','tue','wed','thu','fri','sat'];
      const colors = ['#5b7bf7','#3ecf8e','#d4a537','#c07af5','#ef4444','#5dd8f5'];
      const todayKey = dayKeys[((new Date().getDay()+6)%7)] || 'mon';
      let activeDay = dayKeys.includes(todayKey) ? todayKey : 'mon';

      function getSlots(dk) { const s = (state.schedules||[]).find(x=>x.day===dk); return s ? (s.slots||[]) : []; }

      function renderDay() {
        const slots = getSlots(activeDay);
        const cont = document.getElementById('schedContent');
        if (!cont) return;
        if (slots.length === 0) {
          cont.innerHTML = `<div class="flex flex-col items-center gap-2 py-10"><span style="font-size:36px">📋</span><p class="text-sm text-muted">Розклад не заповнено${canEdit?' — натисніть "Редагувати"':''}</p></div>`;
          return;
        }
        cont.innerHTML = slots.map((s,i) => `
          <div style="display:flex;align-items:center;gap:14px;padding:11px 14px;border-radius:8px;border-left:3px solid ${colors[i%colors.length]};transition:background .15s;margin-bottom:4px;group" 
            onmouseover="this.style.background='var(--bg-secondary)';this.querySelector('.del-slot-btn')&&(this.querySelector('.del-slot-btn').style.opacity='1')" 
            onmouseout="this.style.background='';this.querySelector('.del-slot-btn')&&(this.querySelector('.del-slot-btn').style.opacity='0')">
            <span style="font-size:13px;font-weight:600;color:var(--fg-muted);width:70px;flex-shrink:0;font-family:'Space Grotesk',monospace">${escapeHtml(s.time||'--:--')}</span>
            <div style="flex:1;min-width:0">
              <p class="text-sm font-medium truncate">${escapeHtml(s.subject||'')}</p>
              ${s.teacher?`<p class="text-xs text-muted">${escapeHtml(s.teacher)}</p>`:''}
            </div>
            ${s.room?`<span class="badge badge-muted">🏫 ${escapeHtml(s.room)}</span>`:''}
            ${canEdit?`<button class="btn btn-ghost btn-icon sm del-slot-btn" data-delslot="${i}" style="opacity:0;transition:opacity .15s;flex-shrink:0">${icons.trash}</button>`:''}
          </div>`).join('');

        if (canEdit) {
          cont.querySelectorAll('[data-delslot]').forEach(btn => {
            btn.onclick = async () => {
              const newSlots = getSlots(activeDay).filter((_,idx) => idx !== +btn.dataset.delslot);
              await saveScheduleDay(activeDay, newSlots);
              renderDay();
            };
          });
        }
      }

      el.innerHTML = `<div class="flex flex-col gap-5 animate-fadeIn">
        ${state._inPlanner ? '' : `<div class="flex items-center justify-between" style="flex-wrap:wrap;gap:12px">
          <div class="flex items-center gap-3"><span class="text-primary icon-xl">${icons.clock2}</span><h1 class="text-xl font-bold font-mono">Розклад уроків</h1></div>
          ${canEdit ? `<button class="btn btn-primary" id="editSchedBtn">${icons.pencil} Редагувати</button>` : ''}
        </div>`}
        ${state._inPlanner && canEdit ? `<div class="flex justify-end"><button class="btn btn-primary" id="editSchedBtn">${icons.pencil} Редагувати</button></div>` : ''}
        <div class="flex gap-1" style="flex-wrap:wrap">
          ${dayKeys.map((dk,i)=>`<button class="btn btn-sm ${dk===activeDay?'btn-primary':'btn-ghost'}" data-daytab="${dk}">${days[i].slice(0,3)}</button>`).join('')}
        </div>
        <div class="card p-5" id="schedContent"></div>
      </div>`;
      renderDay();

      el.querySelectorAll('[data-daytab]').forEach(btn => {
        btn.onclick = () => { activeDay=btn.dataset.daytab; el.querySelectorAll('[data-daytab]').forEach(b=>b.className=`btn btn-sm ${b.dataset.daytab===activeDay?'btn-primary':'btn-ghost'}`); renderDay(); };
      });

      if (canEdit) {
        document.getElementById('editSchedBtn').onclick = () => {
          let slots = JSON.parse(JSON.stringify(getSlots(activeDay)));
          if (slots.length===0) slots = [{time:'08:00',subject:'',teacher:'',room:''}];
          function buildSlots(c) {
            c.innerHTML = slots.map((s,i) => `<div class="flex gap-2 mb-2" style="flex-wrap:wrap;align-items:center">
              <input class="input" style="width:76px;flex-shrink:0" data-t="${i}" value="${escapeHtml(s.time||'')}" placeholder="08:00">
              <input class="input" style="flex:1;min-width:90px" data-s="${i}" value="${escapeHtml(s.subject||'')}" placeholder="Предмет">
              <input class="input" style="flex:1;min-width:80px" data-tc="${i}" value="${escapeHtml(s.teacher||'')}" placeholder="Вчитель">
              <input class="input" style="width:65px;flex-shrink:0" data-r="${i}" value="${escapeHtml(s.room||'')}" placeholder="Каб.">
              ${slots.length>1?`<button class="btn btn-ghost btn-icon sm" data-dels="${i}">${icons.trash}</button>`:''}
            </div>`).join('');
            c.querySelectorAll('[data-t]').forEach(x=>x.oninput=()=>slots[+x.dataset.t].time=x.value);
            c.querySelectorAll('[data-s]').forEach(x=>x.oninput=()=>slots[+x.dataset.s].subject=x.value);
            c.querySelectorAll('[data-tc]').forEach(x=>x.oninput=()=>slots[+x.dataset.tc].teacher=x.value);
            c.querySelectorAll('[data-r]').forEach(x=>x.oninput=()=>slots[+x.dataset.r].room=x.value);
            c.querySelectorAll('[data-dels]').forEach(btn=>btn.onclick=()=>{slots.splice(+btn.dataset.dels,1);buildSlots(c);});
          }
          const m = showModal(`<h2 class="text-lg font-bold mb-1">Розклад</h2><p class="text-xs text-muted mb-4">${days[dayKeys.indexOf(activeDay)]}</p>
            <div id="slotsWrap" style="max-height:300px;overflow-y:auto"></div>
            <div class="flex gap-2 mt-3">
              <button class="btn btn-outline btn-sm" id="addSlot">${icons.plus} Урок</button>
              <button class="btn btn-primary ml-auto" id="saveSchedBtn">${icons.check} Зберегти</button>
            </div>`);
          buildSlots(document.getElementById('slotsWrap'));
          document.getElementById('addSlot').onclick = () => { slots.push({time:'',subject:'',teacher:'',room:''}); buildSlots(document.getElementById('slotsWrap')); };
          document.getElementById('saveSchedBtn').onclick = async () => { await saveScheduleDay(activeDay, slots); m.remove(); renderDay(); };
        };
      }
    }

    // ===== LEADERBOARD =====
    function renderLeaderboard(el) {
      const students = state.allUsers.filter(u => u.role === 'student');
      const scores = students.map(stu => {
        const subs = state.submissions.filter(s=>s.studentUid===stu.uid&&s.grade);
        const avgG = subs.length>0 ? subs.reduce((a,s)=>a+(parseFloat(s.grade)||0),0)/subs.length : 0;
        const qrs = (state.quizResults||[]).filter(r=>r.studentUid===stu.uid);
        const avgQ = qrs.length>0 ? qrs.reduce((a,r)=>a+(r.score/r.total*100),0)/qrs.length : 0;
        const grades = (state.grades||[]).filter(g=>g.studentUid===stu.uid);
        const avgJournal = grades.length>0 ? grades.reduce((a,g)=>a+(parseFloat(g.grade)||0),0)/grades.length : 0;
        const total = Math.round((avgG/12*100*0.3)+(avgQ*0.4)+(avgJournal/12*100*0.3));
        return { ...stu, avgGrade: avgG.toFixed(1), avgQuiz: Math.round(avgQ), avgJournal: avgJournal.toFixed(1), total, hwCount: subs.length, quizCount: qrs.length };
      }).sort((a,b) => b.total-a.total);

      const medals = ['🥇','🥈','🥉'];
      const myIdx = scores.findIndex(s=>s.uid===state.user.uid);

      el.innerHTML = `<div class="flex flex-col gap-5 animate-fadeIn">
        <div class="flex items-center gap-3"><span class="text-primary icon-xl">${icons.trophy}</span><h1 class="text-xl font-bold font-mono">Рейтинг учнів</h1></div>
        ${myIdx>=0?`<div class="card p-4 flex items-center gap-3" style="background:rgba(91,123,247,.08);border-color:rgba(91,123,247,.3)">
          <span style="font-size:28px">${myIdx<3?medals[myIdx]:'#'+(myIdx+1)}</span>
          <div><p class="text-sm font-semibold">Ваше місце: ${myIdx+1} з ${scores.length}</p><p class="text-xs text-muted">Рейтинговий бал: ${scores[myIdx].total}</p></div>
        </div>`:''}
        <div class="card" style="overflow:hidden">
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:14px">
              <thead>
                <tr style="border-bottom:1px solid var(--border)">
                  <th style="padding:10px 14px;text-align:left;color:var(--fg-muted);font-size:11px;font-weight:600;width:40px">#</th>
                  <th style="padding:10px 14px;text-align:left;color:var(--fg-muted);font-size:11px;font-weight:600">Учень</th>
                  <th style="padding:10px 14px;text-align:center;color:var(--fg-muted);font-size:11px;font-weight:600">ДЗ</th>
                  <th style="padding:10px 14px;text-align:center;color:var(--fg-muted);font-size:11px;font-weight:600">Тести</th>
                  <th style="padding:10px 14px;text-align:center;color:var(--fg-muted);font-size:11px;font-weight:600">Журнал</th>
                  <th style="padding:10px 14px;text-align:right;color:var(--fg-muted);font-size:11px;font-weight:600">Бал</th>
                </tr>
              </thead>
              <tbody>
                ${scores.length===0?`<tr><td colspan="6" style="padding:32px;text-align:center;color:var(--fg-muted)">Учнів ще немає</td></tr>`:
                scores.map((s,i)=>`<tr style="border-bottom:1px solid var(--border);${s.uid===state.user.uid?'background:rgba(91,123,247,.05)':''}transition:background .15s" onmouseover="this.style.background='rgba(255,255,255,.03)'" onmouseout="this.style.background='${s.uid===state.user.uid?'rgba(91,123,247,.05)':''}'"  >
                  <td style="padding:10px 14px;font-size:15px;font-weight:700;color:${i===0?'#ffd700':i===1?'#c0c0c0':i===2?'#cd7f32':'var(--fg-muted)'}">${i<3?medals[i]:i+1}</td>
                  <td style="padding:10px 14px"><div class="flex items-center gap-2"><div class="avatar avatar-secondary" style="width:28px;height:28px;font-size:11px">${escapeHtml(s.displayName.charAt(0))}</div><span class="text-sm">${escapeHtml(s.displayName)}</span></div></td>
                  <td style="padding:10px 14px;text-align:center;color:var(--accent);font-weight:600">${s.hwCount}</td>
                  <td style="padding:10px 14px;text-align:center;color:var(--primary);font-weight:600">${s.quizCount}</td>
                  <td style="padding:10px 14px;text-align:center;color:var(--chart4);font-weight:600">${s.avgJournal!=='0.0'?s.avgJournal:'—'}</td>
                  <td style="padding:10px 14px;text-align:right;font-size:16px;font-weight:700;color:${s.total>=70?'var(--accent)':s.total>=40?'var(--chart4)':'var(--fg-muted)'}">${s.total}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>
      </div>`;
    }

    // ===== NOTES =====
    const noteColors = ['#1c2240','#1a2e1a','#2e1a1a','#2a1e38','#1a2a2e'];
    const noteColorLabels = ['Синя','Зелена','Червона','Фіолетова','Бірюзова'];
    function renderNotes(el) {
      const u = state.user;
      const myNotes = (state.notes||[]).filter(n => n.authorUid === u.uid);
      el.innerHTML = `<div class="flex flex-col gap-5 animate-fadeIn">
        <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:12px">
          <div class="flex items-center gap-3"><span class="text-primary icon-xl">${icons.pencil}</span><h1 class="text-xl font-bold font-mono">Мої нотатки</h1></div>
          <button class="btn btn-primary" id="newNoteBtn">${icons.plus} Нова нотатка</button>
        </div>
        ${myNotes.length === 0
          ? `<div class="card flex flex-col items-center gap-3 text-center" style="padding:60px"><span style="font-size:48px">📝</span><p class="text-sm text-muted">Нотаток поки немає</p><button class="btn btn-primary" id="newNoteBtn2">${icons.plus} Створити першу</button></div>`
          : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">
              ${myNotes.map(n=>`<div class="card" style="background:${n.color||noteColors[0]};border-color:transparent;cursor:pointer;transition:transform .15s;position:relative" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''" data-editnote="${n.id}">
                <div style="padding:16px 14px 12px">
                  <p class="text-sm font-semibold truncate mb-2">${escapeHtml(n.title||'Без назви')}</p>
                  <p class="text-sm text-muted" style="white-space:pre-wrap;line-height:1.5;max-height:100px;overflow:hidden">${escapeHtml(n.text||'')}</p>
                </div>
                <div style="padding:8px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center">
                  <span class="text-xs text-muted">${formatDate(n.updatedAt||n.createdAt)}</span>
                  <button class="btn btn-ghost btn-icon sm" data-delnote="${n.id}" onclick="event.stopPropagation()">${icons.trash}</button>
                </div>
              </div>`).join('')}
            </div>`}
      </div>`;

      function openNoteEditor(note) {
        const m = showModal(`
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-lg font-bold">${note ? 'Редагувати' : 'Нова нотатка'}</h2>
            <div class="flex gap-1">
              ${noteColors.map((c,i)=>`<div data-nc="${c}" title="${noteColorLabels[i]}" style="width:20px;height:20px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${(note?.color||noteColors[0])===c?'white':'transparent'}" onclick="this.parentElement.querySelectorAll('[data-nc]').forEach(x=>x.style.borderColor='transparent');this.style.borderColor='white';window._noteColor='${c}'"></div>`).join('')}
            </div>
          </div>
          <div class="flex flex-col gap-3">
            <input class="input" id="noteTitle" placeholder="Заголовок..." value="${escapeHtml(note?.title||'')}">
            <textarea class="textarea" id="noteText" placeholder="Текст нотатки..." style="min-height:160px">${escapeHtml(note?.text||'')}</textarea>
            <div class="flex gap-2 justify-end">
              <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Скасувати</button>
              <button class="btn btn-primary" id="saveNoteBtn">${icons.check} Зберегти</button>
            </div>
          </div>`);
        window._noteColor = note?.color || noteColors[0];
        document.getElementById('saveNoteBtn').onclick = async () => {
          const title = document.getElementById('noteTitle').value.trim();
          const text = document.getElementById('noteText').value.trim();
          if (!title && !text) { showToast('Нотатка порожня','error'); return; }
          await saveNote(note?.id||null, title||'Без назви', text, window._noteColor);
          m.remove();
        };
      }

      document.getElementById('newNoteBtn').onclick = () => openNoteEditor(null);
      document.getElementById('newNoteBtn2')?.addEventListener('click', () => openNoteEditor(null));
      el.querySelectorAll('[data-editnote]').forEach(card => { card.onclick = () => { const n=(state.notes||[]).find(x=>x.id===card.dataset.editnote); if(n) openNoteEditor(n); }; });
      el.querySelectorAll('[data-delnote]').forEach(btn => { btn.onclick = e => { e.stopPropagation(); deleteNote(btn.dataset.delnote); }; });
    }

    // ===== SHOP =====

      const cats = [
        { id:'nameColor', label:'🎨 Кольори ніку' },
        { id:'badge',     label:'🏷️ Аксесуари' },
        { id:'frame',     label:'🖼️ Рамки аватару' },
        { id:'bg',        label:'🖼️ Фони профілю' },
      ];
      let activeCat = 'nameColor';

      function build() {
        const items = SHOP_ITEMS.filter(i => i.cat === activeCat);
        el.innerHTML = `<div class="flex flex-col gap-5 animate-fadeIn">
          <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:12px">

              <span class="text-primary icon-xl">${icons.shop}</span>

              const owned = !!inv[item.id];
              const equipped = eq[item.cat] === item.id;
              return `<div class="card" style="padding:18px;display:flex;flex-direction:column;gap:10px;position:relative;${owned?'border-color:rgba(62,207,142,.3)':''}">
                ${owned ? `<span style="position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;color:var(--accent);background:rgba(62,207,142,.1);padding:2px 7px;border-radius:99px">✓ Куплено</span>` : ''}
                <div style="font-size:36px;text-align:center">${item.icon}</div>
                <div style="text-align:center">
                  <p class="text-sm font-semibold">${escapeHtml(item.name)}</p>
                  <p class="text-xs text-muted mt-1">${escapeHtml(item.desc)}</p>
                </div>
                ${item.cat==='nameColor'&&item.color!=='rainbow' ? `<div style="width:100%;height:3px;border-radius:99px;background:${item.color}"></div>` : ''}
                ${item.cat==='nameColor'&&item.color==='rainbow' ? `<div style="width:100%;height:3px;border-radius:99px;background:linear-gradient(90deg,#f472b6,#5b7bf7,#3ecf8e,#d4a537)"></div>` : ''}
                <div style="margin-top:auto">
                  ${owned
                    ? `<button class="btn btn-full btn-sm ${equipped?'btn-outline':'btn-primary'}" data-equipshop="${item.id}">${equipped?'Зняти':'Надіти'}</button>`
                    : `<button class="btn btn-full btn-sm btn-primary" data-buyitem="${item.id}" ${state.coins<item.price?'style="opacity:.5;cursor:not-allowed"':''}><span>🪙 ${item.price}</span> — Купити</button>`
                  }
                </div>
              </div>`;
            }).join('')}
          </div>

          <div class="card p-4" style="background:rgba(212,165,55,.05);border-color:rgba(212,165,55,.2)">
            <p class="text-sm font-semibold" style="color:#d4a537;margin-bottom:6px">🪙 Як заробити монети?</p>
            <ul style="font-size:13px;color:var(--fg-muted);display:flex;flex-direction:column;gap:4px">
              <li>• Здавати домашні завдання вчасно</li>
              <li>• Проходити тести</li>
              <li>• Отримувати хороші оцінки</li>
              <li>• Адмін може нарахувати монети через консоль</li>
            </ul>
          </div>
        </div>`;

        el.querySelectorAll('[data-cat]').forEach(btn => { btn.onclick = () => { activeCat = btn.dataset.cat; build(); }; });
        el.querySelectorAll('[data-buyitem]').forEach(btn => {
          btn.onclick = async () => {
            const item = SHOP_ITEMS.find(x=>x.id===btn.dataset.buyitem);
            if (item) { await buyItem(item); build(); }
          };
        });
        el.querySelectorAll('[data-equipshop]').forEach(btn => {
          btn.onclick = async () => {
            const item = SHOP_ITEMS.find(x=>x.id===btn.dataset.equipshop);
            if (item) { await equipItem(item); build(); }
          };
        });
      }
      build();
    }

    // ===== INIT =====
    // ===== PWA =====
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('[LZ] SW registered:', reg.scope))
          .catch(err => console.log('[LZ] SW error:', err));
      });
    }

    // Install prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      showInstallBanner();
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      hideInstallBanner();
      showToast('✅ LZ встановлено як додаток!');
    });

    function showInstallBanner() {
      if (document.getElementById('installBanner')) return;
      const banner = document.createElement('div');
      banner.id = 'installBanner';
      banner.style.cssText = `
        position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
        background:linear-gradient(135deg,#1c2240,#1a2450);
        border:1px solid rgba(91,123,247,.4);
        border-radius:16px;padding:14px 18px;
        display:flex;align-items:center;gap:14px;
        box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(91,123,247,.2);
        z-index:9998;animation:slideUp .35s ease-out;
        max-width:360px;width:calc(100% - 48px);
      `;
      banner.innerHTML = `
        <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#5b7bf7,#3ecf8e);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 0 16px rgba(91,123,247,.4)">
          <span style="font-family:'Space Grotesk',monospace;font-size:16px;font-weight:900;color:white">LZ</span>
        </div>
        <div style="flex:1;min-width:0">
          <p style="font-size:14px;font-weight:700;color:white;margin-bottom:2px">Встановити LZ</p>
          <p style="font-size:12px;color:rgba(255,255,255,.5)">Додати на домашній екран</p>
        </div>
        <div style="display:flex;gap:8px;flex-shrink:0">
          <button id="installBtn" style="padding:8px 16px;border-radius:8px;background:linear-gradient(135deg,#5b7bf7,#3ecf8e);border:none;color:white;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
            Встановити
          </button>
          <button id="dismissInstall" style="padding:8px 10px;border-radius:8px;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;font-family:inherit">✕</button>
        </div>`;
      document.body.appendChild(banner);

      document.getElementById('installBtn').onclick = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        deferredPrompt = null;
        hideInstallBanner();
        if (outcome === 'accepted') showToast('✅ LZ встановлено!');
      };
      document.getElementById('dismissInstall').onclick = () => {
        hideInstallBanner();
        localStorage.setItem('lz_install_dismissed', Date.now());
      };
    }

    function hideInstallBanner() {
      document.getElementById('installBanner')?.remove();
    }

    // Show manual install hint on iOS (Safari doesn't support beforeinstallprompt)
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isInStandalone = window.navigator.standalone;
    const dismissed = localStorage.getItem('lz_install_dismissed');
    const dismissedRecently = dismissed && Date.now() - dismissed < 7 * 24 * 3600 * 1000;

    if (isIOS && !isInStandalone && !dismissedRecently) {
      setTimeout(() => {
        const tip = document.createElement('div');
        tip.id = 'installBanner';
        tip.style.cssText = `
          position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
          background:linear-gradient(135deg,#1c2240,#1a2450);
          border:1px solid rgba(91,123,247,.4);border-radius:16px;padding:16px 18px;
          box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9998;
          animation:slideUp .35s ease-out;max-width:320px;width:calc(100%-48px);text-align:center
        `;
        tip.innerHTML = `
          <p style="font-size:14px;font-weight:700;color:white;margin-bottom:6px">📲 Встановити LZ на iPhone</p>
          <p style="font-size:12px;color:rgba(255,255,255,.6);line-height:1.6">
            Натисніть <b style="color:white">↑ Поділитись</b> → <b style="color:white">На екран «Домой»</b>
          </p>
          <button onclick="this.parentElement.remove();localStorage.setItem('lz_install_dismissed',Date.now())" 
            style="margin-top:10px;padding:6px 16px;border-radius:8px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;font-family:inherit">
            Зрозуміло
          </button>`;
        document.body.appendChild(tip);
        setTimeout(() => tip.remove(), 10000);
      }, 3000);
    }

    loadSession();
  </script>
</body>
</html>
