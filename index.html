    const roleLabels = { creator: 'Креатор', teacher: 'Вчитель', student: 'Учень', homeroom: 'Кл. кер.' };

    // ===== UI Helpers =====
    function showToast(msg, type = 'success') {
      let tc = document.getElementById('toastContainer');
      if (!tc) { tc = document.createElement('div'); tc.id = 'toastContainer'; tc.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px'; document.body.appendChild(tc); }
      const t = document.createElement('div');
      const bg = type==='error' ? '#ef4444' : type==='info' ? '#5b7bf7' : '#3ecf8e';
      const fg = type==='success' ? '#0d0f1a' : 'white';
      t.style.cssText = `padding:11px 16px;border-radius:10px;font-size:14px;font-weight:500;background:${bg};color:${fg};box-shadow:0 4px 16px rgba(0,0,0,.4);animation:slideUp .3s ease;display:flex;align-items:center;gap:8px;max-width:320px`;
      t.textContent = msg;
      tc.appendChild(t);
      setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 2800);
    }

    function showModal(html) {
      const o = document.createElement('div');
      o.className = 'modal-overlay';
      o.style.cssText = 'position:fixed;inset:0;background:rgba(13,15,26,.85);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s';
      o.innerHTML = `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:460px;max-height:90vh;overflow-y:auto;animation:slideUp .25s ease-out;position:relative">${html}</div>`;
      o.onclick = e => { if(e.target===o) o.remove(); };
      document.body.appendChild(o);
      return o;
    }

    // ===== Utility =====
    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
      return Math.abs(hash).toString(36);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleDateString('uk');
    }

    function formatDateTime(ts) {
      return new Date(ts).toLocaleString('uk');
    }

    // ===== Session =====
    function loadSession() {
      const saved = sessionStorage.getItem('lz_user');
      if (saved) { try { state.user = JSON.parse(saved); } catch(e) { sessionStorage.removeItem('lz_user'); } }
      state.loading = false;
      render();
    }

    function saveSession(user) {
      state.user = user;
      sessionStorage.setItem('lz_user', JSON.stringify(user));
    }

    // ===== Firebase Listeners =====
    db.ref('users').on('value', snap => {
      const data = snap.val();
      state.allUsers = data ? Object.values(data) : [];
      if (state.user) {
        const updated = state.allUsers.find(u => u.uid === state.user.uid);
        if (updated && updated.role !== state.user.role) {
          state.user.role = updated.role;
          sessionStorage.setItem('lz_user', JSON.stringify(state.user));
        }
      }
      render();
    });

    db.ref('homeworks').on('value', snap => {
      const data = snap.val();
      state.homeworks = data ? Object.entries(data).map(([id, v]) => ({...v, id})).sort((a,b) => b.createdAt - a.createdAt) : [];
      render();
    });

    db.ref('submissions').on('value', snap => {
      const data = snap.val();
      state.submissions = data ? Object.entries(data).map(([id, v]) => ({...v, id})).sort((a,b) => b.submittedAt - a.submittedAt) : [];
      render();
    });

    db.ref('quizzes').on('value', snap => {
      const data = snap.val();
      state.quizzes = data ? Object.entries(data).map(([id, v]) => ({...v, id})).sort((a,b) => b.createdAt - a.createdAt) : [];
      render();
    });

    db.ref('quizResults').on('value', snap => {
      const data = snap.val();
      state.quizResults = data ? Object.entries(data).map(([id, v]) => ({...v, id})) : [];
      render();
    });

    db.ref('chat').on('value', snap => {
      const data = snap.val();
      state.chatMessages = data ? Object.entries(data).map(([id,v])=>({...v,id})).sort((a,b)=>a.createdAt-b.createdAt) : [];
      if (state.currentPage === 'chat' && typeof window._chatRefresh === 'function') {
        window._chatRefresh();
      } else if (state.currentPage !== 'chat') {
        render();
      }
    });

    db.ref('notes').on('value', snap => {
      const data = snap.val();
      state.notes = data ? Object.entries(data).map(([id,v])=>({...v,id})).sort((a,b)=>b.createdAt-a.createdAt) : [];
      render();
    });

    db.ref('events').on('value', snap => {
      const data = snap.val();
      state.events = data ? Object.entries(data).map(([id,v])=>({...v,id})).sort((a,b)=>(a.date||'').localeCompare(b.date||'')) : [];
      render();
    });

    db.ref('schedules').on('value', snap => {
      const data = snap.val();
      state.schedules = data ? Object.entries(data).map(([id,v])=>({...v,id})) : [];
      render();
    });

    db.ref('grades').on('value', snap => {
      const data = snap.val();
      state.grades = data ? Object.entries(data).map(([id,v])=>({...v,id})).sort((a,b)=>b.createdAt-a.createdAt) : [];
      render();
    });

    db.ref('library').on('value', snap => {
      const data = snap.val();
      state.library = data ? Object.entries(data).map(([id,v])=>({...v,id})).sort((a,b)=>b.createdAt-a.createdAt) : [];
      render();
    });

    // Live coins for current user
    function listenCoins() {
      if (!state.user) return;
      db.ref('users/' + state.user.uid + '/coins').on('value', snap => {
        state.coins = snap.val() || 0;
        state.user.coins = state.coins;
        saveSession(state.user);
        // refresh coin display without full re-render
        document.querySelectorAll('.coin-display').forEach(el => el.textContent = '🪙 ' + state.coins);
      });
      db.ref('users/' + state.user.uid + '/inventory').on('value', snap => {
        state.user.inventory = snap.val() || {};
        saveSession(state.user);
      });
      db.ref('users/' + state.user.uid + '/equipped').on('value', snap => {
        state.user.equipped = snap.val() || {};
        saveSession(state.user);
      });
    }

    // ===== Auth Functions =====
    async function login(username, password) {
      const snap = await db.ref('users/' + username).once('value');
      if (!snap.exists()) return 'Користувача не знайдено';
      const userData = snap.val();
      if (userData.passwordHash !== simpleHash(password)) return 'Невірний пароль';
      const user = { uid: userData.uid, username: userData.username, displayName: userData.displayName, role: userData.role, createdAt: userData.createdAt, coins: userData.coins||0, inventory: userData.inventory||{}, equipped: userData.equipped||{}, avatar: userData.avatar||null, bio: userData.bio||'', nameColor: userData.nameColor||null, schoolCode: userData.schoolCode||null };
      saveSession(user);
      state.user = user; state.coins = user.coins;
      listenCoins();
      state.currentPage = 'dashboard';
      render();
      return null;
    }

    async function register(username, password, displayName, schoolCode) {
      const snap = await db.ref('users/' + username).once('value');
      if (snap.exists()) return 'Користувач з таким логіном вже існує';
      const newUser = { uid: username, username, displayName, role: 'student', createdAt: Date.now(), passwordHash: simpleHash(password), schoolCode: schoolCode ? schoolCode.toUpperCase() : null };
      await db.ref('users/' + username).set(newUser);
      const user = { uid: newUser.uid, username, displayName, role: 'student', createdAt: newUser.createdAt, schoolCode: newUser.schoolCode };
      saveSession(user);
      state.currentPage = 'dashboard';
      render();
      return null;
    }

    function logout() {
      state.user = null;
      state.currentPage = 'dashboard';
      state.sidebarOpen = false;
      sessionStorage.removeItem('lz_user');
      render();
    }

    // ===== DB Actions =====
    async function updateUserRole(uid, role) { await db.ref('users/' + uid).update({ role }); }
    async function deleteUserAccount(uid) {
      await db.ref('users/' + uid).remove();
      if (state.user && state.user.uid === uid) logout();
    }
    async function createHomework(data) {
      if (!state.user) return;
      const ref = db.ref('homeworks').push();
      await ref.set({ ...data, createdBy: state.user.uid, createdByName: state.user.displayName, createdAt: Date.now() });
    }
    async function deleteHomework(id) { await db.ref('homeworks/' + id).remove(); }
    async function submitHomework(data) {
      const ref = db.ref('submissions').push();
      await ref.set({ ...data, submittedAt: Date.now() });
    }
    async function gradeSubmission(id, grade, feedback) {
      await db.ref('submissions/' + id).update({ grade, feedback });
    }
    async function createAccount(username, password, displayName, role) {
      const snap = await db.ref('users/' + username).once('value');
      if (snap.exists()) return 'Користувач з таким логіном вже існує';
      await db.ref('users/' + username).set({
        uid: username, username, displayName, role, createdAt: Date.now(), passwordHash: simpleHash(password)
      });
      return null;
    }

    async function createSchool(name) {
      const snap = await db.ref('schools').orderByChild('createdBy').equalTo(state.user.uid).once('value');
      if (snap.exists()) { showToast('У вас вже є зареєстрована школа', 'error'); return; }
      const code = Math.random().toString(36).slice(2, 8).toUpperCase();
      const r = db.ref('schools').push();
      await r.set({ name, code, createdBy: state.user.uid, createdByName: state.user.displayName, createdAt: Date.now() });
      await db.ref('users/' + state.user.uid).update({ schoolCode: code, role: 'homeroom' });
      state.user.schoolCode = code;
      state.user.role = 'homeroom';
      saveSession(state.user);
      showToast('Школу "' + name + '" зареєстровано! Код: ' + code);
    }

    async function deleteSchool(id) { await db.ref('schools/' + id).remove(); showToast('Школу видалено', 'info'); }

    async function createQuiz(data) {
      const ref = db.ref('quizzes').push();
      await ref.set({ ...data, createdBy: state.user.uid, createdByName: state.user.displayName, createdAt: Date.now() });
    }
    async function deleteQuiz(id) { await db.ref('quizzes/' + id).remove(); }
    async function saveQuizResult(quizId, score, total) {
      const ref = db.ref('quizResults').push();
      await ref.set({ quizId, studentUid: state.user.uid, studentName: state.user.displayName, score, total, submittedAt: Date.now() });
    }

        const authErr = overlay.querySelector('#authErr');

        function switchTab(toReg) {
          isRegister = toReg;
          tabIn.classList.toggle('active', !toReg);
          tabReg.classList.toggle('active', toReg);
          dnWrap.style.display = toReg ? 'block' : 'none';
          scWrap.style.display = toReg ? 'block' : 'none';

          authErr.style.display = 'none';

        overlay.querySelector('#closeAuth').onclick = () => overlay.remove();

          <nav class="sidebar-nav" aria-label="Основна навігація">
            <ul>
              <li class="nav-section-label">Навчання</li>
              ${navItems.filter(n=>['dashboard','homework','grades','quiz'].includes(n.id)).map(n =>
                `<li><button class="nav-item ${state.currentPage===n.id?'active':''}" data-page="${n.id}">${icons[n.icon]||''} ${escapeHtml(n.label)}</button></li>`
              ).join('')}
              <li class="nav-section-label">Клас</li>
              ${navItems.filter(n=>['chat','planner','leaderboard','notes','shop','library','ai'].includes(n.id)).map(n =>
                `<li><button class="nav-item ${state.currentPage===n.id?'active':''}" data-page="${n.id}">${icons[n.icon]||''} ${escapeHtml(n.label)}</button></li>`
              ).join('')}
              <li class="nav-section-label">Особисте</li>
              ${navItems.filter(n=>['profile'].includes(n.id)).map(n => {
                return `<li><button class="nav-item ${state.currentPage===n.id?'active':''}" data-page="${n.id}">${icons[n.icon]||''} ${escapeHtml(n.label)}</button></li>`;
              }).join('')}
              ${navItems.filter(n=>['admin','console'].includes(n.id)).length>0?`<li class="nav-section-label">Система</li>`:''}
              ${navItems.filter(n=>['admin','console'].includes(n.id)).map(n =>
                `<li><button class="nav-item ${state.currentPage===n.id?'active':''}" data-page="${n.id}">${icons[n.icon]||''} ${escapeHtml(n.label)}</button></li>`
              ).join('')}
            </ul>
          </nav>
          <div class="sidebar-user">
            <div style="position:relative">
              <div class="user-dropdown" id="userDropdown">
                <button class="dropdown-item" data-page="profile" id="ddProfile">${icons.user} Мій профіль</button>
                ${u.role==='creator'||u.role==='homeroom'?`<button class="dropdown-item" id="ddRegSchool">${icons.school} Зареєструвати школу</button>`:''}
                ${u.role==='creator'?`<button class="dropdown-item" data-page="admin" id="ddAdmin">${icons.shield} Керування</button>`:''}
                <div class="dropdown-divider"></div>
                <button class="dropdown-item danger" id="ddLogout">${icons.logout} Вийти</button>
              </div>
              <div class="user-card" id="userCard">
                <div class="avatar avatar-primary">${escapeHtml(u.displayName.charAt(0).toUpperCase())}</div>
                <div class="user-card-info">
                  <div class="user-card-name">${escapeHtml(u.displayName)}</div>
                  <div class="user-card-role role-${u.role}">${roleLabels[u.role]||u.role}</div>
                </div>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--fg-muted);flex-shrink:0"><polyline points="18 15 12 9 6 15"/></svg>
              </div>
            </div>
          </div>
        </aside>
        <main class="main-content" id="mainContent"></main>`;

      // Events
      document.getElementById('menuBtn').onclick = () => { state.sidebarOpen = !state.sidebarOpen; document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('open'); document.getElementById('menuBtn').innerHTML = state.sidebarOpen ? icons.x : icons.menu; };
      document.getElementById('overlay').onclick = () => { state.sidebarOpen = false; document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); document.getElementById('menuBtn').innerHTML = icons.menu; };

      // User card dropdown
      const userCard = document.getElementById('userCard');
      const dropdown = document.getElementById('userDropdown');
      userCard.onclick = (e) => { e.stopPropagation(); dropdown.classList.toggle('open'); };
      document.addEventListener('click', () => dropdown.classList.remove('open'), { once: false });
      document.addEventListener('click', (e) => { if (!userCard.contains(e.target)) dropdown.classList.remove('open'); });

      document.getElementById('ddLogout').onclick = logout;
      document.getElementById('ddProfile').onclick = () => { state.currentPage='profile'; dropdown.classList.remove('open'); render(); };
      document.getElementById('ddAdmin')?.addEventListener('click', () => { state.currentPage='admin'; dropdown.classList.remove('open'); render(); });
      document.getElementById('ddRegSchool')?.addEventListener('click', () => {
        dropdown.classList.remove('open');
        const m = showModal(`<h2 class="text-lg font-bold mb-4">🏫 Зареєструвати школу</h2>
          <div class="flex flex-col gap-3">
            <div><label class="label">Назва школи</label><input class="input" id="schoolNameInput" placeholder="Гімназія №1 м. Київ"></div>
            <p id="schoolErr" class="text-sm text-destructive hidden"></p>
            <div class="flex gap-2 justify-end">
              <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Скасувати</button>
              <button class="btn btn-primary" id="doRegSchool">${icons.check} Зареєструвати</button>
            </div>
          </div>`);
        document.getElementById('doRegSchool').onclick = async () => {
          const name = document.getElementById('schoolNameInput').value.trim();
          if (!name) { document.getElementById('schoolErr').textContent='Введіть назву школи'; document.getElementById('schoolErr').classList.remove('hidden'); return; }
          await createSchool(name); m.remove();
        };
      });

      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.onclick = () => {
          state.currentPage = btn.dataset.page;
          state.sidebarOpen = false;
          document.getElementById('sidebar').classList.remove('open');
          document.getElementById('overlay').classList.remove('open');
          render();
        };
      });

      const main = document.getElementById('mainContent');
      switch (state.currentPage) {
        case 'dashboard':     renderDashboard(main);    break;
        case 'homework':      renderHomework(main);     break;
        case 'grades':        renderGrades(main);       break;
        case 'quiz':          renderQuiz(main);         break;
        case 'chat':          renderChat(main);         break;
        case 'planner':       renderPlanner(main);      break;
        case 'calendar':      renderPlanner(main);      break;
        case 'schedule':      renderPlanner(main);      break;
        case 'leaderboard':   renderLeaderboard(main);  break;
        case 'notes':         renderNotes(main);        break;
        case 'shop':          renderShop(main);         break;
        case 'library':       renderLibrary(main);      break;
        case 'ai':            renderAI(main);           break;
        case 'links':         renderLibrary(main);      break;
        case 'profile':       renderProfile(main);      break;
        case 'notifications': renderProfile(main);      break;
        case 'admin':         renderAdmin(main);        break;
        case 'console':       renderConsole(main);      break;
      }
    }

    // ===== DASHBOARD =====
    function renderDashboard(el) {
      const u = state.user;
      const isStudent = u.role === 'student';
      const mySubs = state.submissions.filter(s => s.studentUid === u.uid);
      const myGraded = mySubs.filter(s => s.grade);
      const myPending = state.homeworks.filter(hw => !state.submissions.some(s => s.homeworkId === hw.id && s.studentUid === u.uid));
      const ungraded = state.submissions.filter(s => !s.grade);
      const students = state.allUsers.filter(u => u.role === 'student').length;
      const teachers = state.allUsers.filter(u => u.role === 'teacher' || u.role === 'creator' || u.role === 'homeroom').length;

      const stats = isStudent ? [
        { l: 'Всього ДЗ', v: state.homeworks.length, i: 'book' },
        { l: 'Здано', v: mySubs.length, i: 'check' },
        { l: 'Оцінено', v: myGraded.length, i: 'file' },
        { l: 'Не здано', v: myPending.length, i: 'clock' },
      ] : [
        { l: 'Всього ДЗ', v: state.homeworks.length, i: 'book' },
        { l: 'Учнів', v: students, i: 'users' },
        { l: 'Вчителів', v: teachers, i: 'users' },
        { l: 'Не перевірено', v: ungraded.length, i: 'clock' },
      ];

      const recent = state.homeworks.slice(0, 5);
      const recentHtml = recent.length === 0 ? `<p class="text-sm text-muted text-center py-4">Завдань поки немає</p>` :
        recent.map(hw => {
          const mySub = state.submissions.find(s => s.homeworkId === hw.id && s.studentUid === u.uid);
          const statusBadge = isStudent ? (mySub ? (mySub.grade ? `<span class="badge badge-accent">${escapeHtml(mySub.grade)}</span>` : `<span class="badge badge-primary">Здано</span>`) : `<span class="badge badge-muted">Не здано</span>`) : '';
          return `<div class="flex items-center gap-3 py-2 border-b" style="border-color:var(--border)"><span class="text-primary shrink-0">${icons.file}</span><div class="flex-1 min-w-0"><p class="text-sm truncate">${escapeHtml(hw.title)}</p><p class="text-xs text-muted">${escapeHtml(hw.subject)}${hw.dueDate ? ' | до ' + escapeHtml(hw.dueDate) : ''}</p></div>${statusBadge}</div>`;
        }).join('');

      let alertHtml = '';
      if (!isStudent && ungraded.length > 0) alertHtml = `<div class="p-4 rounded-lg" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2)"><p class="text-sm font-medium">${ungraded.length} відповідей чекають перевірки</p><p class="text-xs text-muted mt-1">Перейдіть до розділу "Домашні завдання"</p></div>`;
      if (isStudent && myPending.length > 0) alertHtml = `<div class="p-4 rounded-lg" style="background:rgba(212,165,55,0.1);border:1px solid rgba(212,165,55,0.2)"><p class="text-sm font-medium">${myPending.length} завдань ще не здано</p><p class="text-xs text-muted mt-1">Не забудьте здати до дедлайну</p></div>`;

      el.innerHTML = `
        <div class="flex flex-col gap-5 animate-fadeIn">
          <div class="flex items-center gap-3">
            <div style="width:40px;height:40px">${icons.rocket}</div>
            <div><h1 class="text-xl font-bold font-mono">Привіт, ${escapeHtml(u.displayName)}!</h1><p class="text-sm text-muted">${roleLabels[u.role]} | Панель керування LZ</p></div>
          </div>
          <div class="grid grid-4">${stats.map(s => `<div class="card stat-card"><span class="text-primary">${icons[s.i]}</span><div><p class="stat-value">${s.v}</p><p class="stat-label">${s.l}</p></div></div>`).join('')}</div>
          <div class="grid-lg-2">
            <div class="card p-5"><h2 class="text-base font-semibold mb-3">Останні завдання</h2>${recentHtml}</div>
            <div class="card p-5 flex flex-col gap-4">
              <h2 class="text-base font-semibold">Статус системи</h2>
              <div class="p-4 rounded-lg flex items-center gap-3" style="background:rgba(91,123,247,0.1);border:1px solid rgba(91,123,247,0.2)">
                <div style="width:40px;height:40px;flex-shrink:0">${icons.rocket}</div>
                <div><p class="text-sm font-medium">LZ працює</p><p class="text-xs text-accent">Всі системи працюють нормально</p></div>
              </div>
              ${alertHtml}
            </div>
          </div>
        </div>`;
    }

    // ===== HOMEWORK =====
    function renderHomework(el) {
      const u = state.user;
      const canCreate = u.role === 'creator' || u.role === 'teacher' || u.role === 'homeroom' || u.role === 'homeroom';
      const canGrade = canCreate;
      const isStudent = u.role === 'student';

      let html = `<div class="flex flex-col gap-5 animate-fadeIn">
        <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:12px">
          <div class="flex items-center gap-3"><span class="text-primary icon-xl">${icons.book}</span><h1 class="text-xl font-bold font-mono">Домашні завдання</h1></div>
          ${canCreate ? `<button class="btn btn-primary" id="toggleCreateHw">${icons.plus} Створити ДЗ</button>` : ''}
        </div>
        <div id="createHwForm" class="hidden"></div>
        <div id="hwList"></div>
      </div>`;
      el.innerHTML = html;

      if (canCreate) {
        const toggleBtn = document.getElementById('toggleCreateHw');
        const formDiv = document.getElementById('createHwForm');
        let showForm = false;
        toggleBtn.onclick = () => {
          showForm = !showForm;
          toggleBtn.innerHTML = showForm ? `${icons.x} Скасувати` : `${icons.plus} Створити ДЗ`;
          formDiv.style.display = showForm ? 'block' : 'none';
          if (showForm) {
            formDiv.innerHTML = `<div class="card p-5"><h2 class="text-lg font-semibold mb-4">Нове домашнє завдання</h2>
              <form id="hwCreateForm" class="flex flex-col gap-4">
                <div class="form-grid">
                  <div class="flex flex-col gap-2"><label class="label">Назва</label><input class="input" id="hwTitle" placeholder="Назва завдання" required></div>
                  <div class="flex flex-col gap-2"><label class="label">Предмет</label><input class="input" id="hwSubject" placeholder="Математика, Фізика..." required></div>
                </div>
                <div class="flex flex-col gap-2"><label class="label">Опис завдання</label><textarea class="textarea" id="hwDesc" placeholder="Детальний опис..."></textarea></div>
                <div class="flex flex-col gap-2"><label class="label">Дедлайн</label><input type="date" class="input" id="hwDue" style="max-width:220px"></div>
                <div class="flex flex-col gap-2">
                  <label class="label">Посилання для навчання</label>
                  <div id="hwLinksContainer">
                    <div class="flex gap-2 mb-2"><input class="input" placeholder="https://..." id="hwLink0"><input class="input" placeholder="Назва посилання" id="hwLinkName0" style="max-width:180px"></div>
                  </div>
                  <button type="button" class="btn btn-ghost btn-sm" id="addLinkBtn" style="align-self:flex-start">${icons.plus} Додати посилання</button>
                </div>
                <button type="submit" class="btn btn-primary ml-auto">${icons.plus} Створити</button>
              </form></div>`;
            document.getElementById('hwCreateForm').onsubmit = async (e) => {
              e.preventDefault();
              const title = document.getElementById('hwTitle').value.trim();
              const subject = document.getElementById('hwSubject').value.trim();
              if (!title || !subject) return;
              // collect links
              const links = [];
              document.querySelectorAll('#hwLinksContainer .flex').forEach((row, i) => {
                const url = row.querySelector(`#hwLink${i}`)?.value.trim();
                const name = row.querySelector(`#hwLinkName${i}`)?.value.trim();
                if (url) links.push({ url, name: name || url });
              });
              await createHomework({ title, subject, description: document.getElementById('hwDesc').value, dueDate: document.getElementById('hwDue').value, links });
              showForm = false; toggleBtn.innerHTML = `${icons.plus} Створити ДЗ`; formDiv.style.display = 'none';
            };
            let linkCount = 1;
            document.getElementById('addLinkBtn').onclick = () => {
              const c = document.getElementById('hwLinksContainer');
              const div = document.createElement('div');
              div.className = 'flex gap-2 mb-2';
              div.innerHTML = `<input class="input" placeholder="https://..." id="hwLink${linkCount}"><input class="input" placeholder="Назва посилання" id="hwLinkName${linkCount}" style="max-width:180px"><button type="button" class="btn btn-ghost btn-icon sm" onclick="this.parentElement.remove()">${icons.trash}</button>`;
              c.appendChild(div);
              linkCount++;
            };
          }
        };
      }

      renderHwList(document.getElementById('hwList'), u, canCreate, canGrade, isStudent);
    }

    let expandedHw = null;

    function renderHwList(el, u, canCreate, canGrade, isStudent) {
      if (state.homeworks.length === 0) {
        el.innerHTML = `<div class="card flex flex-col items-center gap-3 text-center" style="padding:48px"><span class="text-muted" style="width:48px;height:48px">${icons.book}</span><p class="text-sm text-muted">Домашніх завдань поки немає</p></div>`;
        return;
      }

      el.innerHTML = state.homeworks.map(hw => {
        const isExp = expandedHw === hw.id;
        const hwSubs = state.submissions.filter(s => s.homeworkId === hw.id);
        const mySub = state.submissions.find(s => s.homeworkId === hw.id && s.studentUid === u.uid);
        const isPast = hw.dueDate && new Date(hw.dueDate) < new Date();

        let bodyHtml = '';
        if (isExp) {
          let descHtml = hw.description ? `<div class="hw-desc">${escapeHtml(hw.description)}</div>` : '';
          const linksHtml = (hw.links && hw.links.length > 0) ? `<div class="flex flex-col gap-2"><p class="text-xs font-medium text-muted" style="text-transform:uppercase;letter-spacing:.05em">📎 Матеріали</p>${hw.links.map(l=>`<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-size:13px;text-decoration:none;padding:6px 10px;border-radius:7px;background:rgba(91,123,247,0.08);border:1px solid rgba(91,123,247,0.2);width:fit-content">${icons.link} ${escapeHtml(l.name||l.url)}</a>`).join('')}</div>` : '';

          let studentSection = '';
          if (isStudent && !mySub) {
            studentSection = `<div class="flex flex-col gap-3"><h4 class="text-sm font-medium">Здати завдання</h4><button class="btn btn-outline" data-startsub="${hw.id}">${icons.send} Написати відповідь</button><div id="subForm-${hw.id}" class="hidden"></div></div>`;
          }
          if (isStudent && mySub) {
            const gradeHtml = mySub.grade ? `<div class="grade-box"><p class="text-sm font-medium text-accent">Оцінка: ${escapeHtml(mySub.grade)}</p>${mySub.feedback ? `<p class="text-xs text-muted mt-1">${escapeHtml(mySub.feedback)}</p>` : ''}</div>` : `<p class="text-xs text-muted flex items-center gap-1">${icons.clock} Очікує перевірки</p>`;
            const photoHtml = mySub.photoBase64 ? `<img src="${mySub.photoBase64}" style="max-width:100%;max-height:300px;border-radius:8px;object-fit:contain;border:1px solid var(--border)" alt="Фото відповіді">` : '';
            const textHtml = mySub.text ? `<p class="text-sm" style="white-space:pre-wrap;line-height:1.6">${escapeHtml(mySub.text)}</p>` : '';
            studentSection = `<div class="sub-card"><div class="flex items-center gap-2"><span class="text-accent">${icons.check}</span><h4 class="text-sm font-medium">Ваша відповідь</h4></div>${textHtml}${photoHtml}${gradeHtml}</div>`;
          }

          let teacherSection = '';
          if (canGrade && hwSubs.length > 0) {
            teacherSection = `<div class="flex flex-col gap-3"><h4 class="text-sm font-medium">Відповіді учнів (${hwSubs.length})</h4>${hwSubs.map(sub => {
              const gradeHtml = sub.grade ? `<div class="grade-box"><p class="text-sm text-accent font-medium">Оцінка: ${escapeHtml(sub.grade)}</p>${sub.feedback ? `<p class="text-xs text-muted mt-1">${escapeHtml(sub.feedback)}</p>` : ''}</div>` : `<button class="btn btn-outline btn-sm" data-grade="${sub.id}">${icons.check} Оцінити</button><div id="gradeForm-${sub.id}" class="hidden"></div>`;
              const photoHtml = sub.photoBase64 ? `<img src="${sub.photoBase64}" style="max-width:100%;max-height:280px;border-radius:8px;object-fit:contain;border:1px solid var(--border);cursor:pointer" alt="Фото" onclick="this.style.maxHeight=this.style.maxHeight==='none'?'280px':'none'">` : '';
              const textHtml = sub.text ? `<p class="text-sm" style="white-space:pre-wrap;line-height:1.6">${escapeHtml(sub.text)}</p>` : '';
              return `<div class="sub-card"><div class="flex items-center justify-between" style="flex-wrap:wrap;gap:4px"><span class="text-sm font-medium">${escapeHtml(sub.studentName)}</span><span class="text-xs text-muted">${formatDateTime(sub.submittedAt)}</span></div>${textHtml}${photoHtml}${gradeHtml}</div>`;
            }).join('')}</div>`;
          }
          if (canGrade && hwSubs.length === 0) {
            teacherSection = `<p class="text-sm text-muted text-center py-2">Відповідей ще немає</p>`;
          }

          bodyHtml = `<div class="hw-body">${descHtml}${linksHtml}${studentSection}${teacherSection}</div>`;
        }

        return `<div class="card" style="overflow:hidden;margin-bottom:12px">
          <div class="hw-header" data-toggle="${hw.id}">
            <span class="text-primary shrink-0">${icons.file}</span>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2" style="flex-wrap:wrap"><h3 class="text-sm font-semibold truncate">${escapeHtml(hw.title)}</h3><span class="badge badge-primary">${escapeHtml(hw.subject)}</span></div>
              <div class="flex items-center gap-3 mt-1" style="flex-wrap:wrap">
                <span class="text-xs text-muted">${escapeHtml(hw.createdByName)}</span>
                ${hw.dueDate ? `<span class="text-xs ${isPast ? 'text-destructive' : 'text-muted'} flex items-center gap-1">${icons.calendar} ${escapeHtml(hw.dueDate)}</span>` : ''}
                ${canGrade ? `<span class="text-xs text-muted">${hwSubs.length} відповідей</span>` : ''}
                ${isStudent && mySub ? `<span class="text-xs text-accent flex items-center gap-1">${icons.check} Здано</span>` : ''}
              </div>
            </div>
            ${canCreate ? `<button class="btn btn-ghost btn-icon sm" data-delhw="${hw.id}" aria-label="Видалити">${icons.trash}</button>` : ''}
            <span class="text-muted shrink-0">${isExp ? icons.chevUp : icons.chevDown}</span>
          </div>
          ${bodyHtml}
        </div>`;
      }).join('');

      // Events: toggle
      el.querySelectorAll('[data-toggle]').forEach(btn => {
        btn.onclick = (e) => {
          if (e.target.closest('[data-delhw]') || e.target.closest('[data-startsub]') || e.target.closest('[data-grade]')) return;
          const id = btn.dataset.toggle;
          expandedHw = expandedHw === id ? null : id;
          renderHwList(el, u, canCreate, canGrade, isStudent);
        };
      });

      // Delete HW
      el.querySelectorAll('[data-delhw]').forEach(btn => {
        btn.onclick = (e) => { e.stopPropagation(); deleteHomework(btn.dataset.delhw); };
      });

      // Start submit
      el.querySelectorAll('[data-startsub]').forEach(btn => {
        btn.onclick = () => {
          const hwId = btn.dataset.startsub;
          const formDiv = document.getElementById('subForm-' + hwId);
          btn.style.display = 'none';
          formDiv.style.display = 'block';
          formDiv.innerHTML = `
            <div class="flex flex-col gap-3 mt-2">
              <div style="display:flex;gap:6px;background:var(--bg-secondary);border-radius:8px;padding:3px">
                <button class="sub-tab-btn active" id="tabText-${hwId}" style="flex:1;padding:7px;border-radius:6px;border:none;background:var(--bg-card);color:var(--fg);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s">✏️ Текст</button>
                <button class="sub-tab-btn" id="tabPhoto-${hwId}" style="flex:1;padding:7px;border-radius:6px;border:none;background:transparent;color:var(--fg-muted);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s">📷 Фото</button>
              </div>
              <div id="textSection-${hwId}">
                <textarea class="textarea" id="subText-${hwId}" placeholder="Напишіть вашу відповідь..." style="min-height:90px"></textarea>
              </div>
              <div id="photoSection-${hwId}" style="display:none">
                <label style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;border:2px dashed var(--border);border-radius:10px;cursor:pointer;transition:border-color .15s;background:var(--bg-secondary)" id="photoLabel-${hwId}">

    // ===== PROFILE =====

          <button class="btn btn-sm ${libTab==='links'?'btn-primary':''}" style="${libTab==='links'?'':'background:transparent;color:var(--fg-muted)'}" data-libtab="links">${icons.link} Посилання</button>

                    <div class="flex items-center justify-between" style="margin-top:8px">

                        <span>${icons.eye} ${item.views||0}</span>
                        <span>${formatDate(item.createdAt)}</span>

                      <div class="flex gap-1">
                        ${item.url ? `<a href="${escapeHtml(item.url)}" target="_blank" onclick="event.stopPropagation()" class="btn btn-ghost btn-icon sm" title="Відкрити">${icons.eye}</a>` : ''}
                        ${item.fileData ? `<button class="btn btn-ghost btn-icon sm" data-libdl="${item.id}" onclick="event.stopPropagation()" title="Завантажити">${icons.download}</button>` : ''}
                        ${canAdd ? `<button class="btn btn-ghost btn-icon sm" data-libdel="${item.id}" onclick="event.stopPropagation()" title="Видалити">${icons.trash}</button>` : ''}
                      </div>
                    </div>
                  </div>
                </div>`).join('')}
            </div>`}
        </div>`;

        // Events
        document.getElementById('libSearch').oninput = e => { searchQ = e.target.value.toLowerCase(); build(); };
        el.querySelectorAll('[data-libtype]').forEach(btn => { btn.onclick = () => { activeType = btn.dataset.libtype; build(); }; });
        el.querySelectorAll('[data-libdel]').forEach(btn => { btn.onclick = e => { e.stopPropagation(); deleteLibraryItem(btn.dataset.libdel); }; });

        let hash = 0; for (let c of subj) hash = (hash*31+c.charCodeAt(0))&0xffffffff;
        return colors[Math.abs(hash) % colors.length];
      }

        const m = showModal(`

            <p id="libErr" class="text-sm text-destructive hidden"></p>

            </div>
          </div>`);

        let selType = 'document';
        let fileData = null, fileName = null;

        m.querySelectorAll('[data-picktype]').forEach(btn => {
          btn.onclick = () => {

            m.querySelectorAll('[data-picktype]').forEach(b => b.className='btn btn-sm btn-ghost');

            document.getElementById('libUrlWrap').style.display = selType==='link'||selType==='video' ? '' : 'none';
            document.getElementById('libFileWrap').style.display = selType==='document'||selType==='image' ? '' : 'none';
          };
        });
        // Default: document — show file, hide url
        document.getElementById('libUrlWrap').style.display = 'none';
        document.getElementById('libFileWrap').style.display = '';

        const dropZone = document.getElementById('libDropZone');
        const fileInput = document.getElementById('libFileInput');
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = e => { e.preventDefault(); dropZone.style.borderColor='var(--primary)'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor='var(--border)'; };
        dropZone.ondrop = e => { e.preventDefault(); dropZone.style.borderColor='var(--border)'; handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = () => handleFile(fileInput.files[0]);

        function handleFile(file) {
          if (!file) return;
          if (file.size > 5*1024*1024) { showToast('Файл занадто великий (макс. 5MB)', 'error'); return; }
          fileName = file.name;
          document.getElementById('libFileName').textContent = '✅ ' + file.name;
          const reader = new FileReader();
          reader.onload = e => { fileData = e.target.result; };
          reader.readAsDataURL(file);
        }

        document.getElementById('saveLibBtn').onclick = async () => {
          const title = document.getElementById('libTitle').value.trim();
          const subject = document.getElementById('libSubject').value.trim();
          const desc = document.getElementById('libDesc').value.trim();

          await addLibraryItem({ title, subject, desc, type: selType, url: url||null, fileData: fileData||null, fileName: fileName||null });
          m.remove();
        };
      }

      build();

      async function sendAI() {
        const input = document.getElementById('aiInput');
        const text = input.value.trim();
        if (!text) return;
        input.value = ''; input.style.height = '44px';

        // Add user message
        state.aiHistory.push({ role: 'user', content: text });
        const msgs = document.getElementById('aiMsgs');
        if (!msgs) return;

        // Clear empty state
        if (msgs.querySelector('.flex-col.items-center')) msgs.innerHTML = '';

        // Render user msg
        const userDiv = document.createElement('div');
        userDiv.innerHTML = buildAiMsg({ role:'user', content: text });
        msgs.appendChild(userDiv.firstElementChild);
        scrollToBottom();

        // Typing indicator
        const typingId = 'typing_' + Date.now();
        const typingDiv = document.createElement('div');
        typingDiv.id = typingId;
        typingDiv.style.cssText = 'display:flex;align-items:center;gap:8px';
        typingDiv.innerHTML = `
          <div style="width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#5b7bf7,#c07af5);display:flex;align-items:center;justify-content:center;font-size:11px">🤖</div>
          <div style="padding:10px 14px;border-radius:4px 14px 14px 14px;background:var(--bg-secondary)">
            <span style="display:inline-flex;gap:4px">
              <span style="width:6px;height:6px;border-radius:50%;background:var(--fg-muted);animation:pulse 1s infinite"></span>
              <span style="width:6px;height:6px;border-radius:50%;background:var(--fg-muted);animation:pulse 1s .2s infinite"></span>
              <span style="width:6px;height:6px;border-radius:50%;background:var(--fg-muted);animation:pulse 1s .4s infinite"></span>
            </span>
          </div>`;
        msgs.appendChild(typingDiv);
        scrollToBottom();

        // Disable send
        const sendBtn = document.getElementById('aiSend');
        if (sendBtn) sendBtn.disabled = true;

        try {
          // Build messages for API (last 10 to save tokens)
          const apiMessages = state.aiHistory.slice(-10).map(m => ({
            role: m.role,
            content: typeof m.content === 'string' ? m.content.replace(/<[^>]+>/g,'') : m.content
          }));

          // Use allorigins CORS proxy to bypass browser restrictions
          const apiKey = localStorage.getItem('lz_ai_key');
          if (!apiKey) throw new Error('no_key');

          // Build messages for Gemini format
          const geminiMessages = [];
          const historyForApi = state.aiHistory.slice(-10);
          for (const m of historyForApi) {
            const cleanContent = typeof m.content === 'string' ? m.content.replace(/<[^>]+>/g,'') : m.content;
            geminiMessages.push({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: cleanContent }] });
          }

          // Timeout after 15 seconds
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 15000);

          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'x-goog-api-key': apiKey
            },
            signal: controller.signal,
            body: JSON.stringify({
              system_instruction: { parts: [{ text: 'Ти AI-помічник навчальної платформи LZ для українських школярів. Відповідай українською мовою. Будь дружнім, чітким і корисним. Допомагай з домашніми завданнями, поясненнями тем, перевіркою текстів. Використовуй емодзі де доречно.' }] },
              contents: geminiMessages,
              generationConfig: { maxOutputTokens: 1000, temperature: 0.7 }
            })
          });
          clearTimeout(timeout);

          if (!res.ok) {
            const e = await res.json();
            throw new Error(e.error?.message || 'API error ' + res.status);
          }
          const data = await res.json();
          const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Вибач, не вдалося отримати відповідь.';

          const formatted = reply
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/`([^`]+)`/g, '<code style="background:rgba(255,255,255,.1);padding:1px 5px;border-radius:4px;font-family:monospace;font-size:13px">$1</code>')
            .replace(/^#{1,3}\s(.+)$/gm, '<strong style="font-size:15px">$1</strong>');

          state.aiHistory.push({ role: 'assistant', content: formatted });
          document.getElementById(typingId)?.remove();
          const aiDiv = document.createElement('div');
          aiDiv.innerHTML = buildAiMsg({ role:'assistant', content: formatted });
          msgs.appendChild(aiDiv.firstElementChild);

        } catch(err) {
          document.getElementById(typingId)?.remove();
          let errMsg = '';
          if (err.message === 'no_key') {
            errMsg = `🔑 <strong>Потрібен API ключ Google Gemini</strong>\n\nВведи в консолі LZ:\n<code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;font-family:monospace">setApiKey AIza...</code>\n\nОтримати безкоштовно: <strong>aistudio.google.com → Get API key</strong>`;
          } else if (err.name === 'AbortError') {
            errMsg = `⏱️ Час очікування вийшов. Спробуй ще раз.`;
          } else {
            errMsg = `❌ Помилка: ${err.message}`;
          }
          const errDiv = document.createElement('div');
          errDiv.innerHTML = buildAiMsg({ role:'assistant', content: errMsg });
          msgs.appendChild(errDiv.firstElementChild);
          if (state.aiHistory[state.aiHistory.length-1]?.role === 'user') state.aiHistory.pop();
        }

        if (sendBtn) sendBtn.disabled = false;
        scrollToBottom();
      }

      document.getElementById('aiSend').onclick = sendAI;
      const aiInput = document.getElementById('aiInput');
      aiInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAI(); }
        // Auto-resize
        setTimeout(() => { aiInput.style.height = 'auto'; aiInput.style.height = Math.min(aiInput.scrollHeight, 120) + 'px'; }, 0);
      });
      aiInput.focus();

      // Suggestions
      el.querySelectorAll('.ai-suggest').forEach(btn => {
        btn.onclick = () => { aiInput.value = btn.textContent.slice(2).trim(); aiInput.focus(); };
      });

      document.getElementById('clearAiBtn').onclick = () => { state.aiHistory = []; render(); };
    }

    async function giveCoins(uid, amount) {
      const snap = await db.ref('users/' + uid + '/coins').once('value');
      const cur = snap.val() || 0;
      await db.ref('users/' + uid + '/coins').set(cur + amount);
    }
    async function buyItem(item) {
      const u = state.user;
      const inv = u.inventory || {};
      if (inv[item.id]) { showToast('Вже куплено!', 'info'); return; }
      const coins = u.coins || 0;
      if (coins < item.price) { showToast('Недостатньо монет 🪙', 'error'); return; }
      await db.ref('users/' + u.uid + '/coins').set(coins - item.price);
      inv[item.id] = true;
      await db.ref('users/' + u.uid + '/inventory').set(inv);
      u.coins = coins - item.price; u.inventory = inv; state.coins = u.coins;
      saveSession(u);
      showToast(item.icon + ' ' + item.name + ' — куплено!');
    }
    async function equipItem(item) {
      const u = state.user;
      const eq = u.equipped || {};
      if (eq[item.cat] === item.id) { delete eq[item.cat]; }
      else { eq[item.cat] = item.id; }
      await db.ref('users/' + u.uid + '/equipped').set(eq);
      u.equipped = eq; saveSession(u); render();
    }
    async function saveProfile(displayName, bio, avatar) {
      const u = state.user;
      const updates = {};
      if (displayName) updates.displayName = displayName;
      if (bio !== undefined) updates.bio = bio;
      if (avatar !== undefined) updates.avatar = avatar;
      await db.ref('users/' + u.uid).update(updates);
      if (displayName) u.displayName = displayName;
      if (bio !== undefined) u.bio = bio;
      if (avatar !== undefined) u.avatar = avatar;
      saveSession(u); showToast('Профіль оновлено!'); render();
    }

      const eq = u.equipped || {};
      const inv = u.inventory || {};
      let nameStyle = '';

      let badge = '';
      if (eq.nameColor && inv[eq.nameColor]) {
        const item = SHOP_ITEMS.find(x=>x.id===eq.nameColor);
        if (item) {

          else nameStyle = `color:${item.color};font-weight:700`;
        }
      }
      if (eq.frame && inv[eq.frame]) {
        const item = SHOP_ITEMS.find(x=>x.id===eq.frame);
        if (item) frameStyle = item.style||'';
      }
      if (eq.bg && inv[eq.bg]) bgStyle = BG_STYLES[eq.bg]||'';
      if (eq.badge && inv[eq.badge]) {
        const item = SHOP_ITEMS.find(x=>x.id===eq.badge);
        if (item) badge = item.icon;
      }
      return { nameStyle, frameStyle, bgStyle, badge };
    }

                ${u.avatar ? `<img id="avatarPreviewImg" src="${u.avatar}" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--primary)" alt="">` : `<div id="avatarPreviewImg" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#5b7bf7,#3ecf8e);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:white">${escapeHtml(u.displayName.charAt(0).toUpperCase())}</div>`}
                <div style="position:absolute;bottom:2px;right:2px;width:22px;height:22px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer">📷</div>
              </div>
              <label style="font-size:12px;color:var(--fg-muted);cursor:pointer">
                Натисніть щоб змінити фото
                <input type="file" id="avatarFileInput" accept="image/*" style="display:none">
              </label>
            </div>
            <div><label class="label">Ім'я</label><input class="input" id="editName" value="${escapeHtml(u.displayName)}" maxlength="40"></div>
            <div><label class="label">Про себе</label><textarea class="textarea" id="editBio" placeholder="Розкажіть про себе..." maxlength="120">${escapeHtml(u.bio||'')}</textarea></div>
            <p class="text-xs text-muted">Макс. розмір фото: 2MB</p>
            <div class="flex gap-2 justify-end">
              <button class="btn btn-outline" onclick="this.closest('.modal-overlay').remove()">Скасувати</button>
              <button class="btn btn-primary" id="saveProfileBtn">${icons.check} Зберегти</button>
            </div>
          </div>`);

        let newAvatar = u.avatar || null;
        const fileInput = m.querySelector('#avatarFileInput');
        m.querySelector('#avatarPreviewWrap').onclick = () => fileInput.click();
        fileInput.onchange = () => {
          const file = fileInput.files[0];
          if (!file) return;
          if (file.size > 2 * 1024 * 1024) { showToast('Фото занадто велике (макс. 2MB)', 'error'); return; }
          const reader = new FileReader();
          reader.onload = e => {
            newAvatar = e.target.result;
            const wrap = m.querySelector('#avatarPreviewImg');
            if (wrap.tagName === 'IMG') wrap.src = newAvatar;
            else { const img = document.createElement('img'); img.id='avatarPreviewImg'; img.src=newAvatar; img.style.cssText='width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--primary)'; wrap.replaceWith(img); }
          };
          reader.readAsDataURL(file);
        };
        m.querySelector('#saveProfileBtn').onclick = async () => {
          const name = m.querySelector('#editName').value.trim();
          const bio = m.querySelector('#editBio').value.trim();
          if (!name) { showToast('Введіть ім\'я', 'error'); return; }
          await saveProfile(name, bio, newAvatar);
          m.remove();
        };
      };

      // PWA status in profile
      const pwaStatus = document.getElementById('pwaStatus');
      const pwaInstallBtn = document.getElementById('profileInstallBtn');
      const pwaInstalledBadge = document.getElementById('pwaInstalledBadge');
      if (pwaStatus) {
        const standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (standalone) {
          pwaStatus.textContent = 'Запущено як додаток';
          if (pwaInstalledBadge) pwaInstalledBadge.style.display = 'block';
        } else if (deferredPrompt) {
          pwaStatus.textContent = 'Доступно для встановлення';
          if (pwaInstallBtn) {
            pwaInstallBtn.style.display = 'block';
            pwaInstallBtn.onclick = async () => {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              deferredPrompt = null;
              if (outcome === 'accepted') { showToast('✅ LZ встановлено!'); render(); }
            };
          }
        } else {
          pwaStatus.textContent = isIOS ? 'Встановіть через Safari → Поділитись' : 'Відкрийте у Chrome для встановлення';
        }
      }

      // Avatar click = edit
      document.getElementById('avatarWrap').onclick = () => document.getElementById('editProfileBtn').click();

      // Equip items
      el.querySelectorAll('[data-equip]').forEach(btn => {
        btn.onclick = () => { const item = SHOP_ITEMS.find(x=>x.id===btn.dataset.equip); if(item) equipItem(item); };
      });
      el.querySelectorAll('[data-page="shop"]').forEach(btn => {
        btn.onclick = () => { state.currentPage='shop'; render(); };
      });
    }

    // ===== NOTIFICATIONS =====
    function renderNotifications(el) {
      const u = state.user;
      const isStudent = u.role === 'student';
      const notifs = [];

      if (isStudent) {
        state.homeworks.filter(hw => !state.submissions.some(s => s.homeworkId === hw.id && s.studentUid === u.uid)).forEach(hw => {
          const isPast = hw.dueDate && new Date(hw.dueDate) < new Date();
          notifs.push({ type: isPast ? 'warning' : 'info', title: isPast ? 'Прострочене завдання' : 'Нове завдання', msg: `${hw.title} (${hw.subject})${hw.dueDate ? ' — до ' + hw.dueDate : ''}`, time: formatDate(hw.createdAt) });
        });
        state.submissions.filter(s => s.studentUid === u.uid && s.grade).forEach(sub => {
          const hw = state.homeworks.find(h => h.id === sub.homeworkId);
          notifs.push({ type: 'success', title: 'Оцінка отримана', msg: `${hw?.title || 'Завдання'}: ${sub.grade}${sub.feedback ? ' — ' + sub.feedback : ''}`, time: formatDate(sub.submittedAt) });
        });
      } else {
        state.submissions.filter(s => !s.grade).forEach(sub => {
          const hw = state.homeworks.find(h => h.id === sub.homeworkId);
          notifs.push({ type: 'info', title: 'Нова відповідь', msg: `${sub.studentName} здав(ла) "${hw?.title || 'завдання'}"`, time: formatDate(sub.submittedAt) });
        });
      }

      const iconMap = { info: icons.book, success: icons.check, warning: icons.alert };

      el.innerHTML = `<div class="flex flex-col gap-5 animate-fadeIn">
        <div class="flex items-center justify-between"><div class="flex items-center gap-3"><span class="text-primary icon-xl">${icons.bell}</span><h1 class="text-xl font-bold font-mono">Сповіщення</h1></div><span class="text-sm text-muted">${notifs.length} подій</span></div>
        ${notifs.length === 0 ? `<div class="card flex flex-col items-center gap-3 text-center" style="padding:48px"><span class="text-muted" style="width:48px;height:48px">${icons.bell}</span><p class="text-sm text-muted">Немає нових сповіщень</p></div>` :
        notifs.map(n => `<div class="card p-4 flex items-start gap-3"><div class="notif-icon notif-${n.type}">${iconMap[n.type]}</div><div class="flex-1 min-w-0"><h3 class="text-sm font-semibold">${escapeHtml(n.title)}</h3><p class="text-sm text-muted mt-1" style="line-height:1.6">${escapeHtml(n.msg)}</p><p class="text-xs text-muted mt-1">${escapeHtml(n.time)}</p></div></div>`).join('')}
      </div>`;
    }

    // ===== ADMIN =====
    function renderAdmin(el) {
      const u = state.user;
      if (u.role !== 'creator') {
        el.innerHTML = `<div class="flex flex-col items-center justify-center gap-4" style="padding:80px 0"><span class="text-muted" style="width:64px;height:64px">${icons.shield}</span><p class="text-muted">Тільки Креатор має доступ</p></div>`;
        return;
      }

      const students = state.allUsers.filter(u => u.role === 'student').length;

      el.innerHTML = `<div class="flex flex-col gap-5 animate-fadeIn">
        <div class="flex items-center gap-3"><span class="text-primary icon-xl">${icons.shield}</span><h1 class="text-xl font-bold font-mono">Керування</h1></div>
        <div class="grid grid-4">
          <div class="card stat-card"><span class="text-primary">${icons.users}</span><div><p class="stat-value">${state.allUsers.length}</p><p class="stat-label">Всього</p></div></div>
          <div class="card stat-card"><span class="text-accent">${icons.grad}</span><div><p class="stat-value">${students}</p><p class="stat-label">Учнів</p></div></div>
          <div class="card stat-card"><span class="text-chart4">${icons.book}</span><div><p class="stat-value">${state.homeworks.length}</p><p class="stat-label">ДЗ</p></div></div>
          <div class="card stat-card"><span class="text-primary">${icons.file}</span><div><p class="stat-value">${state.submissions.length}</p><p class="stat-label">Відповідей</p></div></div>
        </div>

        <div class="card p-5">
          <div class="flex items-center justify-between mb-4" style="flex-wrap:wrap;gap:12px">
            <h2 class="text-base font-semibold">Акаунти користувачів</h2>
            <button class="btn btn-primary btn-sm" id="toggleCreateAccount">${icons.userPlus} Створити акаунт</button>
          </div>
          <div id="createAccountForm" class="hidden" style="margin-bottom:16px"></div>
          <div id="usersList"></div>
        </div>

        <div class="card p-5">
          <h2 class="text-base font-semibold mb-3">Домашні завдання</h2>
          <div id="adminHwList"></div>
        </div>
      </div>`;

      // Create account toggle
      const createBtn = document.getElementById('toggleCreateAccount');
      const createDiv = document.getElementById('createAccountForm');
      let showCreate = false;
      createBtn.onclick = () => {
        showCreate = !showCreate;
        createBtn.innerHTML = showCreate ? `${icons.x} Скасувати` : `${icons.userPlus} Створити акаунт`;
        createDiv.style.display = showCreate ? 'block' : 'none';
        if (showCreate) {
          createDiv.innerHTML = `<div class="p-4 rounded-lg" style="background:rgba(28,31,54,0.5)">
            <form id="createAccForm" class="flex flex-col gap-3">
              <div class="form-grid">
                <div class="flex flex-col gap-1"><label class="label">Ім'я</label><input class="input" id="newDN" placeholder="Ім'я користувача"></div>
                <div class="flex flex-col gap-1"><label class="label">Логін</label><input class="input" id="newUN" placeholder="Логін"></div>
                <div class="flex flex-col gap-1"><label class="label">Пароль</label><input type="password" class="input" id="newPW" placeholder="Пароль"></div>
                <div class="flex flex-col gap-1"><label class="label">Роль</label><select class="select" id="newRole"><option value="student">Учень</option><option value="teacher">Вчитель</option><option value="homeroom">Кл. кер.</option><option value="creator">Креатор</option></select></div>
              </div>
              <p id="createErr" class="text-sm text-destructive hidden"></p>
              <button type="submit" class="btn btn-primary btn-sm ml-auto">${icons.userPlus} Створити</button>
            </form></div>`;
          document.getElementById('createAccForm').onsubmit = async (e) => {
            e.preventDefault();
            const dn = document.getElementById('newDN').value.trim();
            const un = document.getElementById('newUN').value.trim();
            const pw = document.getElementById('newPW').value.trim();
            const role = document.getElementById('newRole').value;
            const errEl = document.getElementById('createErr');
            errEl.classList.add('hidden');
            if (!dn || !un || !pw) { errEl.textContent = 'Заповніть всі поля'; errEl.classList.remove('hidden'); return; }
            const err = await createAccount(un, pw, dn, role);
            if (err) { errEl.textContent = err; errEl.classList.remove('hidden'); return; }
            showCreate = false; createBtn.innerHTML = `${icons.userPlus} Створити акаунт`; createDiv.style.display = 'none';
          };
        }
      };

      // Users list
      renderUsersList(document.getElementById('usersList'), u);

      // HW list for admin
      const hwEl = document.getElementById('adminHwList');
      if (state.homeworks.length === 0) {
        hwEl.innerHTML = `<p class="text-sm text-muted text-center py-4">ДЗ поки немає</p>`;
      } else {
        hwEl.innerHTML = state.homeworks.map(hw => {
          const subs = state.submissions.filter(s => s.homeworkId === hw.id);
          return `<div class="flex items-center gap-3 py-2 px-3 rounded-lg" style="transition:background 0.2s"><span class="text-primary shrink-0">${icons.book}</span><div class="flex-1 min-w-0"><p class="text-sm font-medium truncate">${escapeHtml(hw.title)}</p><p class="text-xs text-muted">${escapeHtml(hw.subject)} | ${escapeHtml(hw.createdByName)} | ${subs.length} відповідей</p></div><button class="btn btn-ghost btn-icon sm" data-admindelhw="${hw.id}" aria-label="Видалити">${icons.trash}</button></div>`;
        }).join('');
        hwEl.querySelectorAll('[data-admindelhw]').forEach(btn => { btn.onclick = () => deleteHomework(btn.dataset.admindelhw); });
      }
    }

    let changingRole = null;
    let confirmDel = null;

    function renderUsersList(el, currentUser) {
      if (state.allUsers.length === 0) { el.innerHTML = `<p class="text-sm text-muted text-center py-4">Користувачів ще немає</p>`; return; }

      el.innerHTML = state.allUsers.map(u => {
        let roleHtml;
        if (changingRole === u.uid) {
          roleHtml = `<div class="flex items-center gap-1">${['student','teacher','homeroom','creator'].map(r =>
            `<button class="badge ${u.role === r ? 'role-badge-' + r : 'badge-muted'}" data-setrole="${u.uid}" data-role="${r}" style="cursor:pointer">${roleLabels[r]}</button>`
          ).join('')}<button class="btn btn-ghost btn-sm" data-cancelrole="1" style="font-size:11px;padding:2px 6px">X</button></div>`;
        } else {
          roleHtml = `<button class="badge role-badge-${u.role}" data-changerole="${u.uid}" style="cursor:pointer">${roleLabels[u.role]} ${icons.chevDown}</button>`;
        }

        let deleteHtml = '';
        if (u.uid !== currentUser.uid) {
          if (confirmDel === u.uid) {
            deleteHtml = `<div class="flex items-center gap-1"><button class="btn btn-destructive btn-sm" data-confirmdeluser="${u.uid}">Так</button><button class="btn btn-ghost btn-sm" data-canceldel="1">Ні</button></div>`;
          } else {
            deleteHtml = `<button class="btn btn-ghost btn-icon sm" data-deluser="${u.uid}" aria-label="Видалити">${icons.trash}</button>`;
          }
        }

        return `<div class="flex items-center gap-3 py-3 px-3 rounded-lg border-b" style="border-color:var(--border);flex-wrap:wrap">
          <div class="flex items-center gap-3 flex-1 min-w-0">
            <div class="avatar avatar-secondary" style="width:32px;height:32px;font-size:12px">${escapeHtml(u.displayName.charAt(0).toUpperCase())}</div>
            <div class="flex-1 min-w-0"><p class="text-sm font-medium truncate">${escapeHtml(u.displayName)}</p><p class="text-xs text-muted">@${escapeHtml(u.username)}</p></div>
          </div>
          <div class="flex items-center gap-2">${roleHtml}${deleteHtml}</div>
        </div>`;
      }).join('');

      // Role change events
      el.querySelectorAll('[data-changerole]').forEach(btn => { btn.onclick = () => { changingRole = btn.dataset.changerole; renderUsersList(el, currentUser); }; });
      el.querySelectorAll('[data-cancelrole]').forEach(btn => { btn.onclick = () => { changingRole = null; renderUsersList(el, currentUser); }; });
      el.querySelectorAll('[data-setrole]').forEach(btn => { btn.onclick = async () => { await updateUserRole(btn.dataset.setrole, btn.dataset.role); changingRole = null; }; });

      // Delete events
      el.querySelectorAll('[data-deluser]').forEach(btn => { btn.onclick = () => { confirmDel = btn.dataset.deluser; renderUsersList(el, currentUser); }; });
      el.querySelectorAll('[data-canceldel]').forEach(btn => { btn.onclick = () => { confirmDel = null; renderUsersList(el, currentUser); }; });
      el.querySelectorAll('[data-confirmdeluser]').forEach(btn => { btn.onclick = async () => { await deleteUserAccount(btn.dataset.confirmdeluser); confirmDel = null; }; });
    }

    // ===== QUIZ =====
    let activeQuiz = null, quizState = {};

    function renderQuiz(el) {
      const u = state.user;
      const canManage = u.role === 'creator' || u.role === 'teacher' || u.role === 'homeroom';
      if (activeQuiz) { renderQuizPlay(el); return; }

      el.innerHTML = `<div class="flex flex-col gap-5 animate-fadeIn">
        <div class="flex items-center justify-between" style="flex-wrap:wrap;gap:12px">
          <div class="flex items-center gap-3"><span class="text-primary" style="width:24px;height:24px">${icons.quiz}</span><h1 class="text-xl font-bold font-mono">Тести</h1></div>
          ${canManage ? `<button class="btn btn-primary" id="createQuizBtn">${icons.plus} Створити тест</button>` : ''}
        </div>
        <div id="quizList"></div>
      </div>`;

      if (canManage) document.getElementById('createQuizBtn').onclick = () => showCreateQuizModal(el);

      const ql = document.getElementById('quizList');
      if (state.quizzes.length === 0) {
        ql.innerHTML = `<div class="card flex flex-col items-center gap-3 text-center" style="padding:48px"><span class="text-muted" style="width:48px;height:48px">${icons.quiz}</span><p class="text-sm text-muted">Тестів поки немає</p>${canManage?`<button class="btn btn-primary" id="createQuizBtn2">${icons.plus} Створити перший тест</button>`:''}</div>`;
        if (canManage) document.getElementById('createQuizBtn2')?.addEventListener('click', () => showCreateQuizModal(el));
        return;
      }

      ql.innerHTML = state.quizzes.map(q => {
        const myResults = state.quizResults.filter(r => r.studentUid === u.uid && r.quizId === q.id);
        const best = myResults.length > 0 ? myResults.reduce((a,b) => a.score > b.score ? a : b) : null;
        const allResults = state.quizResults.filter(r => r.quizId === q.id);
        return `<div class="card p-4 mb-3">
          <div class="flex items-start justify-between gap-3" style="flex-wrap:wrap">
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1" style="flex-wrap:wrap">
                <span class="text-primary">${icons.quiz}</span>
                <h3 class="text-base font-semibold">${escapeHtml(q.title)}</h3>
                ${q.subject ? `<span class="badge badge-primary">${escapeHtml(q.subject)}</span>` : ''}
              </div>
              <p class="text-xs text-muted">Автор: ${escapeHtml(q.createdByName)} • ${(q.questions||[]).length} питань</p>
              ${best ? `<div class="flex items-center gap-2 mt-2"><span class="badge badge-accent">🏆 Мій рекорд: ${best.score}/${best.total} (${Math.round(best.score/best.total*100)}%)</span></div>` : ''}
              ${canManage && allResults.length > 0 ? `<p class="text-xs text-muted mt-1">Пройшло учнів: ${allResults.length}</p>` : ''}
            </div>
            <div class="flex items-center gap-2">
              <button class="btn btn-primary btn-sm" data-playquiz="${q.id}">${icons.arrow} Пройти</button>
              ${canManage ? `<button class="btn btn-ghost btn-icon sm" data-delquiz="${q.id}">${icons.trash}</button>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');

      ql.querySelectorAll('[data-playquiz]').forEach(btn => {
        btn.onclick = () => {
          activeQuiz = state.quizzes.find(q => q.id === btn.dataset.playquiz);
          quizState = { current: 0, answers: [], done: false, startTime: Date.now() };
          renderQuiz(el);
        };
      });
      ql.querySelectorAll('[data-delquiz]').forEach(btn => {
        btn.onclick = () => { if(confirm('Видалити тест?')) deleteQuiz(btn.dataset.delquiz); };
      });
    }

    function renderQuizPlay(el) {
      const q = activeQuiz;
      const qs = quizState;
      const questions = q.questions || [];

      if (qs.done) {
        const score = qs.answers.filter((a,i) => a === questions[i].correct).length;
        const pct = Math.round(score / questions.length * 100);
        const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '👍' : '💪';
        saveQuizResult(q.id, score, questions.length);

        el.innerHTML = `<div class="flex flex-col items-center gap-5 animate-fadeIn" style="max-width:500px;margin:0 auto;padding:40px 0;text-align:center">
          <div style="font-size:72px">${emoji}</div>
          <h2 class="text-2xl font-bold font-mono">Тест завершено!</h2>
          <div class="card p-6 w-full">
            <p class="text-4xl font-bold" style="color:${pct>=70?'var(--accent)':pct>=50?'var(--chart4)':'var(--destructive)'}">${score} / ${questions.length}</p>
            <p class="text-muted mt-1">${pct}% правильних відповідей</p>
            <div class="quiz-progress mt-4"><div class="quiz-progress-bar" style="width:${pct}%;background:${pct>=70?'var(--accent)':pct>=50?'var(--chart4)':'var(--destructive)'}"></div></div>
          </div>
          <div style="width:100%;text-align:left">
            <h3 class="text-sm font-semibold mb-3 text-muted">Розбір відповідей:</h3>
            ${questions.map((qq,i) => {
              const correct = qs.answers[i] === qq.correct;
              return `<div class="card p-3 mb-2" style="border-left:3px solid ${correct?'var(--accent)':'var(--destructive)'}">
                <p class="text-sm font-medium">${i+1}. ${escapeHtml(qq.question)}</p>
                <p class="text-xs mt-1" style="color:${correct?'var(--accent)':'var(--destructive)'}">${correct?'✓ Правильно':'✗ Неправильно'} — ${escapeHtml((qq.options||[])[qq.correct]||'')}</p>
              </div>`;
            }).join('')}
          </div>
          <div class="flex gap-3">
            <button class="btn btn-outline" id="retryBtn">Спробувати ще раз</button>
            <button class="btn btn-primary" id="backBtn">До тестів</button>
          </div>
        </div>`;
        document.getElementById('retryBtn').onclick = () => { quizState = { current:0, answers:[], done:false, startTime:Date.now() }; renderQuizPlay(el); };
        document.getElementById('backBtn').onclick = () => { activeQuiz=null; renderQuiz(el); };
        return;
      }

      const cur = questions[qs.current];
      const prog = Math.round((qs.current / questions.length) * 100);

      el.innerHTML = `<div class="flex flex-col gap-5 animate-fadeIn" style="max-width:600px;margin:0 auto">
        <div class="flex items-center justify-between">
          <button class="btn btn-ghost btn-sm" id="quitBtn">${icons.x} Вийти</button>
          <span class="text-sm font-medium text-muted">${qs.current+1} / ${questions.length}</span>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs text-muted">${escapeHtml(q.title)}</span>
            <span class="text-xs font-bold" style="color:var(--primary)">${prog}%</span>
          </div>
          <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${prog}%;background:linear-gradient(90deg,var(--primary),var(--accent));transition:width 0.4s;border-radius:3px"></div>
          </div>
        </div>
        <div class="card p-6">
          <p class="text-xs text-muted font-medium mb-3" style="text-transform:uppercase;letter-spacing:.05em">Питання ${qs.current+1}</p>
          <h2 class="text-lg font-semibold mb-5" style="line-height:1.5">${escapeHtml(cur.question)}</h2>
          <div class="flex flex-col gap-3">
            ${(cur.options||[]).map((opt,i) => `<button class="quiz-option" data-opt="${i}"><span style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;background:var(--border);font-size:11px;font-weight:700;margin-right:8px;flex-shrink:0">${String.fromCharCode(65+i)}</span>${escapeHtml(opt)}</button>`).join('')}
          </div>
        </div>
      </div>`;

      document.getElementById('quitBtn').onclick = () => { activeQuiz=null; renderQuiz(el); };

      el.querySelectorAll('.quiz-option').forEach(btn => {
        btn.onclick = () => {
          el.querySelectorAll('.quiz-option').forEach(b => b.disabled = true);
          const chosen = parseInt(btn.dataset.opt);
          btn.classList.add(chosen === cur.correct ? 'correct' : 'wrong');
          if (chosen !== cur.correct) el.querySelectorAll('.quiz-option')[cur.correct].classList.add('correct');
          qs.answers.push(chosen);
          setTimeout(() => {
            qs.current++;
            if (qs.current >= questions.length) qs.done = true;
            renderQuizPlay(el);
          }, 900);
        };
      });
    }

        return questions.map((q,qi) => `

            ${(q.options||[]).map((o,oi) => `<div class="flex items-center gap-2 mb-2">
              <input type="radio" name="correct_${qi}" value="${oi}" ${q.correct===oi?'checked':''} data-qchoose="${qi}-${oi}" style="accent-color:var(--accent);cursor:pointer;width:16px;height:16px;flex-shrink:0">

      overlay.innerHTML = `

            <div><label class="label">Предмет</label><input class="input" id="qzSubject" placeholder="Математика, Фізика..."></div>
          </div>
          <div id="qzQuestionsBox">${buildQHtml()}</div>
          <button type="button" class="btn btn-outline btn-sm mb-4" id="addQBtn">${icons.plus} Додати питання</button>
          <div class="flex gap-2 justify-end pt-3" style="border-top:1px solid var(--border)">
            <button type="button" class="btn btn-ghost" id="cancelQz">Скасувати</button>
            <button type="button" class="btn btn-primary" id="saveQzBtn">${icons.check} Зберегти тест</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      function rebind() {
        const box = overlay.querySelector('#qzQuestionsBox');
        box.querySelectorAll('[data-qt]').forEach(inp => { inp.oninput = () => { questions[+inp.dataset.qt].question = inp.value; }; });
        box.querySelectorAll('[data-qo]').forEach(inp => { inp.oninput = () => { const [qi,oi]=inp.dataset.qo.split('-').map(Number); questions[qi].options[oi]=inp.value; }; });
        box.querySelectorAll('[data-qchoose]').forEach(r => { r.onchange = () => { const [qi,oi]=r.dataset.qchoose.split('-').map(Number); questions[qi].correct=oi; }; });
        box.querySelectorAll('[data-rmq]').forEach(btn => { btn.onclick = () => { questions.splice(+btn.dataset.rmq,1); box.innerHTML=buildQHtml(); rebind(); }; });
      }
      rebind();

      overlay.querySelector('#addQBtn').onclick = () => {
        questions.push({ question:'', options:['','','',''], correct:0 });
        const box = overlay.querySelector('#qzQuestionsBox');
        box.innerHTML = buildQHtml();
        rebind();
        box.lastElementChild?.scrollIntoView({ behavior:'smooth' });
      };
      overlay.querySelector('#cancelQz').onclick = () => overlay.remove();
      overlay.querySelector('#saveQzBtn').onclick = async () => {
        const title = overlay.querySelector('#qzTitle').value.trim();
        const subject = overlay.querySelector('#qzSubject').value.trim();
        if (!title) { alert('Введіть назву тесту'); return; }
        if (questions.some(q => !q.question.trim())) { alert('Заповніть всі питання'); return; }
        if (questions.some(q => q.options.some(o => !o.trim()))) { alert('Заповніть всі варіанти відповідей'); return; }
        await createQuiz({ title, subject, questions });
        overlay.remove();
        renderQuiz(pageEl);
      };
    }

      function printTable(headers, rows) {
        const widths = headers.map((h, i) => Math.max(h.length, ...rows.map(r => String(r[i]||'').length)));
        const sep = '┼' + widths.map(w => '─'.repeat(w+2)).join('┼') + '┼';
        const fmt = row => '│' + row.map((c,i) => ' ' + String(c||'').padEnd(widths[i]) + ' ').join('│') + '│';
        print(sep, '#1c3a4a');
        print(fmt(headers), '#5b7bf7');
        print(sep, '#1c3a4a');
        rows.forEach(r => print(fmt(r), '#e8e9f0'));
        print(sep, '#1c3a4a');
